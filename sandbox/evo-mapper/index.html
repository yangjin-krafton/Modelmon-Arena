<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evo Line → AI Brand Mapper (79:79)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0e0e1a; color: #ddd; font-family: 'Segoe UI', sans-serif; }

    /* Layout: 왼쪽 브랜드 패널 + 오른쪽 그리드 */
    .app { display: flex; height: 100vh; }

    /* ── LEFT PANEL: 브랜드 목록 ── */
    .panel {
      width: 280px; flex-shrink: 0; background: #12121e; border-right: 1px solid #222;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-header { padding: 12px; border-bottom: 1px solid #222; }
    .panel-header h1 { font-size: 1rem; color: #7b2ff7; margin-bottom: 2px; }
    .panel-header .sub { font-size: 0.7rem; color: #555; }
    .panel-stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
      padding: 8px 12px; border-bottom: 1px solid #222; background: #0e0e18;
    }
    .panel-stats .s { text-align: center; }
    .panel-stats .s .n { font-size: 1.1rem; font-weight: 900; color: #7b2ff7; }
    .panel-stats .s .l { font-size: 0.6rem; color: #555; }
    .panel-search {
      padding: 6px 12px; border-bottom: 1px solid #222;
    }
    .panel-search input {
      width: 100%; background: #1a1a2e; border: 1px solid #333; color: #fff;
      padding: 5px 8px; border-radius: 4px; font-size: 0.8rem;
    }
    .brand-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .brand-group-label {
      padding: 6px 12px 2px; font-size: 0.6rem; color: #444;
      text-transform: uppercase; letter-spacing: 1px; font-weight: 700;
      position: sticky; top: 0; background: #12121e; z-index: 1;
    }
    .brand-item {
      display: flex; align-items: center; gap: 8px; padding: 5px 12px;
      cursor: pointer; transition: background 0.1s; font-size: 0.8rem;
      border-left: 3px solid transparent;
    }
    .brand-item:hover { background: #1a1a30; }
    .brand-item.active { background: #1e1e40; border-left-color: var(--c); }
    .brand-item .dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .brand-item .bname { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-item .bcount {
      font-size: 0.65rem; background: #222; color: #666; padding: 1px 5px;
      border-radius: 8px; min-width: 18px; text-align: center;
    }
    .brand-item .bcount.has { background: var(--c); color: #fff; }
    .brand-item.dimmed { opacity: 0.35; }

    .panel-actions { padding: 8px 12px; border-top: 1px solid #222; display: flex; flex-direction: column; gap: 4px; }
    .panel-actions button {
      padding: 6px; background: #222; color: #aaa; border: 1px solid #333;
      border-radius: 4px; cursor: pointer; font-size: 0.75rem; text-align: center;
    }
    .panel-actions button:hover { background: #333; color: #fff; }
    .panel-actions button.primary { background: #7b2ff7; color: #fff; border-color: #7b2ff7; }

    /* ── RIGHT: 메인 그리드 ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .toolbar {
      padding: 8px 16px; border-bottom: 1px solid #222; background: #0e0e18;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .toolbar .search-main {
      background: #1a1a2e; border: 1px solid #333; color: #fff;
      padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; width: 180px;
    }
    .filter-pills { display: flex; gap: 4px; }
    .pill {
      padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; cursor: pointer;
      border: 1px solid #333; background: #1a1a2e; color: #777;
    }
    .pill.active { background: #7b2ff7; color: #fff; border-color: #7b2ff7; }
    .toolbar .spacer { flex: 1; }
    .toolbar .hint { font-size: 0.65rem; color: #444; }

    /* Grid */
    .grid-scroll { flex: 1; overflow-y: auto; padding: 8px 16px; }
    .evo-grid { display: flex; flex-direction: column; gap: 4px; }
    .evo-row {
      display: flex; align-items: center; gap: 8px; padding: 6px 10px;
      background: #151525; border: 1px solid #1e1e35; border-radius: 6px;
      cursor: pointer; transition: all 0.1s; user-select: none;
      border-left: 4px solid transparent;
    }
    .evo-row:hover { background: #1a1a38; border-color: #333; }
    .evo-row.assigned { border-left-color: var(--brand-color); }
    .evo-row.highlight { box-shadow: 0 0 0 2px var(--brand-color); }
    .evo-row.painting { background: #1e2850; }

    .evo-num { font-size: 0.6rem; color: #444; width: 32px; text-align: right; flex-shrink: 0; }
    .evo-sprites { display: flex; gap: 1px; flex-shrink: 0; }
    .evo-sprites img {
      width: 40px; height: 40px; image-rendering: pixelated;
      background: #0a0a14; border-radius: 3px;
    }
    .evo-info { flex: 1; min-width: 0; }
    .evo-name { font-weight: 700; font-size: 0.85rem; }
    .evo-meta { font-size: 0.65rem; color: #555; }
    .evo-tag {
      padding: 2px 8px; border-radius: 3px; font-size: 0.65rem; font-weight: 600;
      white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis;
    }
    .evo-tag.empty { background: #1a1a1a; color: #444; }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #7b2ff7; color: #fff; padding: 8px 20px; border-radius: 6px;
      font-size: 0.8rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>

function parseCSV(t) {
  const lines = t.trim().split('\n');
  const h = lines[0].split(',');
  return lines.slice(1).map(l => {
    const v = l.split(',');
    const o = {};
    h.forEach((k, i) => o[k.trim()] = (v[i]||'').trim());
    return o;
  });
}

  const usedBrands = new Set(evoLines.map(e => e.assigned_brand).filter(Boolean)).size;

    <div class="s"><div class="n">${total-assigned}</div><div class="l">남은</div></div>
  `;
}

  // 브랜드별 할당 수
  const counts = {};
  BRANDS.forEach(b => counts[b.key] = 0);
  evoLines.forEach(e => { if (e.assigned_brand) counts[e.assigned_brand] = (counts[e.assigned_brand]||0) + 1; });

  // 할당된 브랜드 집합
  const assignedSet = new Set(evoLines.map(e => e.assigned_brand).filter(Boolean));

  // 그룹별
  let lastGroup = '';

  for (const b of BRANDS) {
    if (q && !b.key.toLowerCase().includes(q) && !b.group.toLowerCase().includes(q)) continue;

    if (b.group !== lastGroup) {
      lastGroup = b.group;
      const lbl = document.createElement('div');
      lbl.className = 'brand-group-label';
      lbl.textContent = b.group;
      list.appendChild(lbl);
    }

    el.className = 'brand-item';
    el.style.setProperty('--c', b.color);
    if (activeBrand === b.key) el.classList.add('active');

      <span class="dot" style="background:${b.color}"></span>
      <span class="bname">${b.key}</span>
      <span class="bcount${c?' has':''}" ${c?`style="background:${b.color}"`:''}>${c}</span>
    `;

    el.addEventListener('click', () => {
      activeBrand = activeBrand === b.key ? null : b.key;
      render();
    });
    list.appendChild(el);
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const q = evoSearch.toLowerCase();

  for (const evo of evoLines) {
    // filter
    if (evoFilter === 'unassigned' && evo.assigned_brand) continue;
    if (evoFilter === 'assigned' && !evo.assigned_brand) continue;
    if (evoFilter === 's1' && evo.stage_count !== '1') continue;
    if (evoFilter === 's2' && evo.stage_count !== '2') continue;
    if (evoFilter === 's3' && parseInt(evo.stage_count) < 3) continue;
    if (q && !evo.evo_line_name.toLowerCase().includes(q) && !evo.members.includes(q)
        && !(evo.assigned_brand||'').toLowerCase().includes(q)) continue;

    const row = document.createElement('div');
    row.className = 'evo-row';
    const brand = brandMap[evo.assigned_brand];
    if (brand) {
      row.classList.add('assigned');
      row.style.setProperty('--brand-color', brand.color);
    }

    const members = evo.members.split('/');
    const sprites = members.map(m =>
      `<img src="../originals/${m}.png" alt="#${m}" loading="lazy" onerror="this.style.opacity=0.2">`
    ).join('');

    let tag;
    if (brand) {
      tag = `<span class="evo-tag" style="background:${brand.color}25;color:${brand.color}">${brand.key}</span>`;
    } else {
      tag = `<span class="evo-tag empty">—</span>`;
    }

    row.innerHTML = `
      <span class="evo-num">${evo.evo_line_id.replace('EVO','')}</span>
      <div class="evo-sprites">${sprites}</div>
      <div class="evo-info">
        <div class="evo-name">${evo.evo_line_name}</div>
        <div class="evo-meta">#${members[0]}–${members[members.length-1]} · ${evo.stage_count}단 · ${members.length}체</div>
      </div>
      ${tag}
    `;

    // Click / drag paint
    const assign = () => {
      if (!activeBrand) { evo.assigned_brand = ''; render(); return; }
      evo.assigned_brand = evo.assigned_brand === activeBrand ? '' : activeBrand;
      render();
    };
    row.addEventListener('mousedown', e => { isPainting = true; assign(); e.preventDefault(); });
    row.addEventListener('mouseenter', () => { if (isPainting) assign(); });

    grid.appendChild(row);
  }
}

// Global mouseup
document.addEventListener('mouseup', () => isPainting = false);

// ============================================================
// FILTERS
// ============================================================
document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.classList.contains('pill')) return;
  evoFilter = e.target.dataset.f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  renderGrid();
});

document.getElementById('evo-search').addEventListener('input', e => {
  evoSearch = e.target.value;
  renderGrid();
});

document.getElementById('brand-search').addEventListener('input', e => {
  brandSearch = e.target.value;
  renderBrands();
});

// ============================================================
// ACTIONS
// ============================================================
document.getElementById('btn-auto').addEventListener('click', () => {
  const unassigned = evoLines.filter(e => !e.assigned_brand);
  if (!unassigned.length) { toast('모두 할당됨'); return; }
  const usedKeys = new Set(evoLines.map(e => e.assigned_brand).filter(Boolean));
  const available = BRANDS.filter(b => !usedKeys.has(b.key));
  let idx = 0;
  for (const evo of unassigned) {
    if (idx < available.length) {
      evo.assigned_brand = available[idx].key;
      idx++;
    }
  }
  render();
  toast(`${idx}개 자동 할당`);
});

document.getElementById('btn-clear').addEventListener('click', () => {
  evoLines.forEach(e => e.assigned_brand = '');
  render();
  toast('전체 해제');
});

document.getElementById('btn-export').addEventListener('click', () => {
  const h = 'evo_line_id,evo_line_name,dex_start,dex_end,members,stage_count,assigned_brand';
  const rows = evoLines.map(e =>
    `${e.evo_line_id},${e.evo_line_name},${e.dex_start},${e.dex_end},${e.members},${e.stage_count},${e.assigned_brand}`
  );
  const blob = new Blob([h + '\n' + rows.join('\n') + '\n'], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gen1-evo-lines.csv';
  a.click();
  toast('CSV 저장됨');
});

document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('csv-file').click();
});
document.getElementById('csv-file').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    const imp = parseCSV(r.result);
    const m = {};
    imp.forEach(row => m[row.evo_line_id] = row.assigned_brand || '');
    evoLines.forEach(evo => { if (m[evo.evo_line_id] !== undefined) evo.assigned_brand = m[evo.evo_line_id]; });
    render();
    toast(`${imp.length}행 가져옴`);
  };
  r.readAsText(f);
  e.target.value = '';
});

// Keyboard: ESC = 브랜드 선택 해제
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { activeBrand = null; render(); }
});

// ============================================================
// TOAST
// ============================================================
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
