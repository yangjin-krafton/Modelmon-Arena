<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>모델몬 아케이드 도감</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0e1020;
    }
    #app {
      width: 100vw;
      height: 100vh;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.13.0/dist/pixi.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const appHost = document.getElementById("app");
    const roster = [
      { no: "001", name: "지피티삼점오", role: "대화형", color: 0x7cf29a },
      { no: "004", name: "클로드하이쿠", role: "정렬형", color: 0x5fe0c6 },
      { no: "007", name: "제미니나노", role: "멀티형", color: 0x7c89ff },
      { no: "039", name: "토큰팝", role: "생성형", color: 0xff9a69 }
    ];

    function box(g, x, y, w, h, fill, line = 0x000000, alpha = 0.4) {
      g.rect(x, y, w, h).fill(fill).stroke({ color: line, width: 2, alpha, alignment: 1 });
    }

    function textNode(text, size, color, x, y, anchorX = 0, anchorY = 0) {
      const node = new PIXI.Text({
        text,
        style: {
          fontFamily: "Courier New",
          fontSize: size,
          fontWeight: "700",
          fill: color,
          letterSpacing: 1
        }
      });
      node.anchor.set(anchorX, anchorY);
      node.position.set(Math.round(x), Math.round(y));
      node.roundPixels = true;
      return node;
    }

    function glyph(container, x, y, size, accent, label) {
      const g = new PIXI.Graphics();
      box(g, x, y, size, size, 0x1b2038, 0xffffff, 0.08);
      box(g, x + 6, y + 6, size - 12, size - 12, 0x222945, 0xffffff, 0.04);
      box(g, x + size * 0.22, y + size * 0.22, size * 0.56, size * 0.56, accent, 0xffffff, 0.08);
      box(g, x + size * 0.34, y + size * 0.34, size * 0.32, size * 0.32, 0xeaf3ff, 0xffffff, 0.08);
      container.addChild(g);
      container.addChild(textNode(label, Math.max(10, Math.floor(size * 0.12)), 0xeaf3ff, x + size / 2, y + size / 2, 0.5, 0.5));
    }

    async function main() {
      const app = new PIXI.Application();
      await app.init({
        resizeTo: appHost,
        backgroundAlpha: 0,
        antialias: false,
        autoDensity: true,
        resolution: Math.min(window.devicePixelRatio || 1, 2)
      });
      app.canvas.style.imageRendering = "pixelated";
      appHost.appendChild(app.canvas);

      function render() {
        const w = app.screen.width;
        const h = app.screen.height;
        const stage = app.stage;
        stage.removeChildren();

        const root = new PIXI.Container();
        root.roundPixels = true;
        stage.addChild(root);

        const bg = new PIXI.Graphics();
        bg.rect(0, 0, w, h).fill(0x0f1121);
        bg.rect(0, 0, w, 160).fill(0x151936);
        for (let i = 0; i < 18; i += 1) {
          bg.rect(14 + i * 22, 18 + (i % 3) * 8, 8, 8).fill(i % 2 ? 0x5fe0c6 : 0xff9a69);
        }
        root.addChild(bg);

        const panel = new PIXI.Graphics();
        box(panel, 12, 12, w - 24, h - 24, 0x171b31, 0xffffff, 0.08);
        box(panel, 20, 20, w - 40, h - 40, 0x101428, 0xffffff, 0.04);
        root.addChild(panel);

        root.addChild(textNode("MODELMON ARCADE DEX", 18, 0xf7fbff, 28, 32));
        root.addChild(textNode("STAGE SELECT / STATIC", 11, 0x96a4c8, 28, 58));
        root.addChild(textNode("CREDIT 151", 12, 0xffcf73, w - 28, 32, 1, 0));

        const heroY = 92;
        const heroH = 226;
        const hero = new PIXI.Graphics();
        box(hero, 28, heroY, w - 56, heroH, 0x21284a, 0xffffff, 0.08);
        box(hero, 36, heroY + 8, w - 72, heroH - 16, 0x16203c, 0xffffff, 0.04);
        root.addChild(hero);

        glyph(root, 48, heroY + 30, 120, roster[0].color, roster[0].no);
        root.addChild(textNode("PLAYER LOCK", 11, 0x7cf29a, 186, heroY + 32));
        root.addChild(textNode(roster[0].name, 22, 0xffffff, 186, heroY + 58));
        root.addChild(textNode(roster[0].role, 12, 0xa4b1d7, 186, heroY + 90));
        root.addChild(textNode("도감 메인 캐릭터 카드", 14, 0xffcf73, 186, heroY + 126));
        root.addChild(textNode("대형 표본 + HUD + 팀 슬롯", 12, 0xbcc7e8, 186, heroY + 152));
        root.addChild(textNode("모바일 홈 화면처럼 보이게 설계", 12, 0xbcc7e8, 186, heroY + 174));

        const meter = new PIXI.Graphics();
        box(meter, 186, heroY + 198, w - 234, 10, 0x30406c, 0xffffff, 0.03);
        box(meter, 186, heroY + 198, (w - 234) * 0.72, 10, roster[0].color, 0xffffff, 0.03);
        root.addChild(meter);

        root.addChild(textNode("TEAM PRESET", 13, 0xf7fbff, 28, 338));

        const cardGap = 10;
        const cardY = 366;
        const cardH = 122;
        const cardW = Math.floor((w - 56 - cardGap) / 2);
        for (let i = 1; i <= 2; i += 1) {
          const item = roster[i];
          const x = 28 + (i - 1) * (cardW + cardGap);
          const g = new PIXI.Graphics();
          box(g, x, cardY, cardW, cardH, 0x1b213f, 0xffffff, 0.06);
          box(g, x + 6, cardY + 6, cardW - 12, cardH - 12, 0x141a32, 0xffffff, 0.03);
          box(g, x + 12, cardY + 12, 54, 18, item.color, 0xffffff, 0.06);
          root.addChild(g);
          glyph(root, x + 12, cardY + 40, 56, item.color, item.no);
          root.addChild(textNode(item.no, 11, 0xf7fbff, x + 39, cardY + 21, 0.5, 0.5));
          root.addChild(textNode(item.name, 13, 0xf7fbff, x + 80, cardY + 42));
          root.addChild(textNode(item.role, 11, 0xa3b0d3, x + 80, cardY + 64));
          root.addChild(textNode("도감 슬롯 카드", 11, 0xffcf73, x + 80, cardY + 90));
        }

        root.addChild(textNode("QUICK WALL", 13, 0xf7fbff, 28, 510));
        const cols = 4;
        const gap = 10;
        const cell = Math.floor((w - 56 - gap * (cols - 1)) / cols);
        for (let i = 0; i < 8; i += 1) {
          const item = roster[i % roster.length];
          const col = i % cols;
          const row = Math.floor(i / cols);
          const x = 28 + col * (cell + gap);
          const y = 536 + row * (cell + 28 + gap);
          const g = new PIXI.Graphics();
          box(g, x, y, cell, cell + 22, 0x1b213f, 0xffffff, 0.06);
          root.addChild(g);
          glyph(root, x + 8, y + 8, cell - 16, item.color, String(i + 1).padStart(3, "0"));
          root.addChild(textNode(String(i + 1).padStart(3, "0"), 10, 0xbcc7e8, x + cell / 2, y + cell + 11, 0.5, 0.5));
        }

        const nav = new PIXI.Graphics();
        box(nav, 28, h - 78, w - 56, 42, 0x21284a, 0xffffff, 0.06);
        root.addChild(nav);
        ["도감", "편성", "기록", "상점"].forEach((item, index) => {
          root.addChild(textNode(item, 12, index === 0 ? 0xffcf73 : 0xd9e1f7, 56 + index * ((w - 112) / 3), h - 63, index === 0 ? 0 : 0.5, 0));
        });
      }

      render();
      window.addEventListener("resize", render);
    }

    main();
  </script>
</body>
</html>
