<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>모델몬 도감 타임라인형</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #171617; }
    #app { width: 100vw; height: 100vh; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.13.0/dist/pixi.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script id="evo-data" type="text/plain">
dex_no,line_id,line_name,dex_range,members,stage_count,stage_index,assigned_brand
001,EVO01,Bulbasaur Line,001-003,001/002/003,3,1,OpenAI
002,EVO01,Bulbasaur Line,001-003,001/002/003,3,2,OpenAI
003,EVO01,Bulbasaur Line,001-003,001/002/003,3,3,OpenAI
004,EVO02,Charmander Line,004-006,004/005/006,3,1,Anthropic
005,EVO02,Charmander Line,004-006,004/005/006,3,2,Anthropic
006,EVO02,Charmander Line,004-006,004/005/006,3,3,Anthropic
007,EVO03,Squirtle Line,007-009,007/008/009,3,1,Google DeepMind
008,EVO03,Squirtle Line,007-009,007/008/009,3,2,Google DeepMind
009,EVO03,Squirtle Line,007-009,007/008/009,3,3,Google DeepMind
  </script>
  <script id="skill-data" type="text/plain">
skill_no,skill_name_ko,ai_element,ai_pattern,ai_status_family_ko,ai_status_element_ko,power,accuracy,pp,effect_ko
001,기억 흡수,메모리,흡수,회복,메모리,20,100,25,준 피해의 절반만큼 자신을 회복한다.
002,오염 산성,정렬,단일 공격,노출,검색,40,100,30,피해와 함께 추가 상태이상을 남길 가능성이 있다.
003,오염 산성 갑주,정렬,버프,증폭,학습,—,—,20,자신의 핵심 성능을 크게 끌어올린다.
004,추론 가속,시스템,버프,증폭,학습,—,—,30,자신의 핵심 성능을 크게 끌어올린다.
005,추론 망각,메모리,버프,증폭,학습,—,—,20,자신의 핵심 성능을 크게 끌어올린다.
006,정렬 오로라 빔,정렬,단일 공격,없음,없음,65,100,20,피해와 함께 추가 상태이상을 남길 가능성이 있다.
007,프롬프트 연사,대화,연타,없음,없음,15,85,20,한 번에 여러 차례 연속 타격한다.
008,추론 장벽,정렬,보호막,보호,정렬,—,—,20,자신의 핵심 성능을 크게 끌어올린다.
009,프롬프트 비축,추론,충전 후 발동,없음,없음,—,—,10,원작 기술의 역할을 참고해 전투 리듬을 조정하는 재해석 스킬이다.
  </script>
  <script>
    const NAMES={001:"지피티삼점오",002:"지피티포",003:"지피티포오",004:"클로드하이쿠",005:"클로드소네트",006:"클로드오푸스",007:"제미니나노",008:"제미니프로",009:"제미니울트라"};
    const COLORS={001:0x78d971,002:0x59b96f,003:0x2e8c66,004:0xff9862,005:0xf07a4e,006:0xc45432,007:0x79a6ff,008:0x607aff,009:0x4855dc};
    const host=document.getElementById("app");
    function parseCsv(text){const rows=[];let row=[],value="",inside=false;for(let i=0;i<text.length;i+=1){const c=text[i],n=text[i+1];if(c==='"'){if(inside&&n==='"'){value+='"';i+=1;}else inside=!inside;continue;}if(c===','&&!inside){row.push(value);value="";continue;}if((c==='\n'||c==='\r')&&!inside){if(c==='\r'&&n==='\n')i+=1;row.push(value);if(row.some(cell=>cell.length>0))rows.push(row);row=[];value="";continue;}value+=c;}if(value.length||row.length){row.push(value);rows.push(row);}const [headers,...records]=rows;return records.map(record=>Object.fromEntries(headers.map((h,idx)=>[h,record[idx]??""])));}
    const evo=parseCsv(document.getElementById("evo-data").textContent.trim());
    const skills=Object.fromEntries(parseCsv(document.getElementById("skill-data").textContent.trim()).map(r=>[r.skill_no,r]));
    const entries=evo.map(r=>({...r,name_ko:NAMES[r.dex_no],accent:COLORS[r.dex_no],skill:skills[r.dex_no]}));
    function txt(text,size,fill,x,y,ax=0,ay=0){const n=new PIXI.Text({text,style:{fontFamily:"Courier New",fontSize:size,fontWeight:"700",fill,letterSpacing:1,lineHeight:size+4}});n.anchor.set(ax,ay);n.position.set(Math.round(x),Math.round(y));n.roundPixels=true;return n;}
    function box(root,x,y,w,h,fill,line=0x000000,alpha=0.1){const g=new PIXI.Graphics();g.rect(x,y,w,h).fill(fill).stroke({color:line,width:2,alpha,alignment:1});root.addChild(g);return g;}
    function chip(root,x,y,w,h,accent,label){box(root,x,y,w,h,accent,0x000000,0.04);root.addChild(txt(label,10,0xfffbf3,x+w/2,y+9,0.5,0));}
    async function main(){const app=new PIXI.Application();await app.init({resizeTo:host,backgroundAlpha:0,antialias:false,autoDensity:true,resolution:Math.min(window.devicePixelRatio||1,2)});app.canvas.style.imageRendering="pixelated";host.appendChild(app.canvas);const state={selected:"007"};function render(){const w=app.screen.width,h=app.screen.height;app.stage.removeChildren();const root=new PIXI.Container();root.roundPixels=true;app.stage.addChild(root);box(root,0,0,w,h,0x1b1919,0x1b1919,0);box(root,10,10,w-20,h-20,0x9d8c81,0x000000,0.08);box(root,16,16,w-32,h-32,0xf1ece3,0x3b3430,0.08);const e=entries.find(v=>v.dex_no===state.selected)||entries[0];const innerX=28,innerW=w-56;box(root,innerX,28,innerW,72,0x2d2826,0x000000,0.14);root.addChild(txt("EVOLUTION LOG",18,0xfff9ef,innerX+14,42));root.addChild(txt("계열 타임라인 중심 UI",11,0xd6cbc0,innerX+14,64));root.addChild(txt(e.name_ko,12,e.accent,innerX+innerW-14,42,1,0));root.addChild(txt(e.assigned_brand,11,0xffcf74,innerX+innerW-14,64,1,0));
      box(root,innerX,116,innerW,188,0xf8f3eb,0x3b3430,0.06); root.addChild(txt("계열 타임라인",13,0x2f2824,innerX+12,130));
      const members=e.members.split('/'); const lineY=188; const startX=innerX+42; const step=(innerW-84)/(members.length-1||1); const g=new PIXI.Graphics(); g.moveTo(startX,lineY).lineTo(startX+step*(members.length-1),lineY).stroke({color:0x8f8176,width:4,alpha:0.4}); root.addChild(g);
      members.forEach((id,idx)=>{const x=startX+step*idx; const active=id===e.dex_no; const c=new PIXI.Graphics(); c.circle(x,lineY,active?18:14).fill({color:active?e.accent:0xcfc1b2,alpha:1}).stroke({color:0x3b3430,width:2,alpha:0.12}); root.addChild(c); root.addChild(txt(id,10,active?0xfff9ef:0x5b5047,x,lineY-5,0.5,0)); root.addChild(txt(NAMES[id],10,0x6d6258,x,lineY+24,0.5,0)); });
      root.addChild(txt(`원작 계열 ${e.line_name}`,12,0x6d6258,innerX+12,232)); root.addChild(txt(`범위 ${e.dex_range} / 단계 ${e.stage_index} of ${e.stage_count}`,12,0x6d6258,innerX+12,256)); root.addChild(txt(`브랜드 ${e.assigned_brand}`,12,0x6d6258,innerX+12,278));

      box(root,innerX,318,innerW,154,0xe4d4bc,0x3b3430,0.06); root.addChild(txt("전투 로그",13,0x2f2824,innerX+12,332)); chip(root,innerX+12,356,52,22,e.accent,e.skill.ai_element); chip(root,innerX+70,356,70,22,0x8f8176,e.skill.ai_pattern); chip(root,innerX+146,356,70,22,0xb48c56,e.skill.ai_status_family_ko); root.addChild(txt(e.skill.skill_name_ko,18,e.accent,innerX+12,390)); root.addChild(txt(`위력 ${e.skill.power}  명중 ${e.skill.accuracy}  PP ${e.skill.pp}`,11,0x6d6258,innerX+12,418)); root.addChild(txt(e.skill.effect_ko,11,0x2f2824,innerX+12,442));

      root.addChild(txt("전체 타임라인",13,0x2f2824,innerX,500)); const cols=3,gap=10,cellW=Math.floor((innerW-gap*2)/3),cellH=74; entries.forEach((item,index)=>{const col=index%3,row=Math.floor(index/3),x=innerX+col*(cellW+gap),y=520+row*(cellH+gap),active=item.dex_no===state.selected; const hit=box(root,x,y,cellW,cellH,active?0x332c29:0xf8f3eb,0x3b3430,active?0.14:0.04); hit.eventMode="static"; hit.cursor="pointer"; hit.on("pointertap",()=>{state.selected=item.dex_no;render();}); const dot=new PIXI.Graphics(); dot.circle(x+16,y+18,8).fill({color:item.accent,alpha:1}); root.addChild(dot); root.addChild(txt(item.dex_no,10,active?0xfff9ef:0x2f2824,x+30,y+10)); root.addChild(txt(item.name_ko,10,active?0xfff9ef:0x2f2824,x+30,y+28)); root.addChild(txt(item.line_id,10,active?item.accent:0x7e7368,x+30,y+46)); });
    } render(); window.addEventListener("resize",render);} main();
  </script>
</body>
</html>
