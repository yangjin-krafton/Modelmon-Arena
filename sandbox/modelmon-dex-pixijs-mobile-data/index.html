<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>모델몬 도감 모바일 데이터 샘플</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #171312;
    }

    #app {
      width: 100vw;
      height: 100vh;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.13.0/dist/pixi.min.js"></script>
</head>
<body>
  <div id="app"></div>

  <script id="evo-data" type="text/plain">
dex_no,line_id,line_name,dex_range,members,stage_count,stage_index,assigned_brand
001,EVO01,Bulbasaur Line,001-003,001/002/003,3,1,OpenAI
002,EVO01,Bulbasaur Line,001-003,001/002/003,3,2,OpenAI
003,EVO01,Bulbasaur Line,001-003,001/002/003,3,3,OpenAI
004,EVO02,Charmander Line,004-006,004/005/006,3,1,Anthropic
005,EVO02,Charmander Line,004-006,004/005/006,3,2,Anthropic
006,EVO02,Charmander Line,004-006,004/005/006,3,3,Anthropic
007,EVO03,Squirtle Line,007-009,007/008/009,3,1,Google DeepMind
008,EVO03,Squirtle Line,007-009,007/008/009,3,2,Google DeepMind
009,EVO03,Squirtle Line,007-009,007/008/009,3,3,Google DeepMind
  </script>

  <script id="skill-data" type="text/plain">
skill_no,skill_name_ko,ai_element,ai_pattern,ai_status_family_ko,ai_status_element_ko,power,accuracy,pp,effect_ko
001,기억 흡수,메모리,흡수,회복,메모리,20,100,25,준 피해의 절반만큼 자신을 회복한다.
002,오염 산성,정렬,단일 공격,노출,검색,40,100,30,피해와 함께 추가 상태이상을 남길 가능성이 있다.
003,오염 산성 갑주,정렬,버프,증폭,학습,—,—,20,자신의 핵심 성능을 크게 끌어올린다.
004,추론 가속,시스템,버프,증폭,학습,—,—,30,자신의 핵심 성능을 크게 끌어올린다.
005,추론 망각,메모리,버프,증폭,학습,—,—,20,자신의 핵심 성능을 크게 끌어올린다.
006,정렬 오로라 빔,정렬,단일 공격,없음,없음,65,100,20,피해와 함께 추가 상태이상을 남길 가능성이 있다.
007,프롬프트 연사,대화,연타,없음,없음,15,85,20,한 번에 여러 차례 연속 타격한다.
008,추론 장벽,정렬,보호막,보호,정렬,—,—,20,자신의 핵심 성능을 크게 끌어올린다.
009,프롬프트 비축,추론,충전 후 발동,없음,없음,—,—,10,원작 기술의 역할을 참고해 전투 리듬을 조정하는 재해석 스킬이다.
  </script>

  <script>
    const appHost = document.getElementById("app");
    const MODELMON_NAMES = {
      "001": "지피티삼점오",
      "002": "지피티포",
      "003": "지피티포오",
      "004": "클로드하이쿠",
      "005": "클로드소네트",
      "006": "클로드오푸스",
      "007": "제미니나노",
      "008": "제미니프로",
      "009": "제미니울트라"
    };

    const MODELMON_COLORS = {
      "001": 0x78d971,
      "002": 0x59b96f,
      "003": 0x2e8c66,
      "004": 0xff9862,
      "005": 0xf07a4e,
      "006": 0xc45432,
      "007": 0x79a6ff,
      "008": 0x607aff,
      "009": 0x4855dc
    };

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = "";
      let insideQuotes = false;
      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];
        if (char === '"') {
          if (insideQuotes && next === '"') {
            value += '"';
            i += 1;
          } else {
            insideQuotes = !insideQuotes;
          }
          continue;
        }
        if (char === "," && !insideQuotes) {
          row.push(value);
          value = "";
          continue;
        }
        if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(value);
          if (row.some((cell) => cell.length > 0)) rows.push(row);
          row = [];
          value = "";
          continue;
        }
        value += char;
      }
      if (value.length || row.length) {
        row.push(value);
        rows.push(row);
      }
      const [headers, ...records] = rows;
      return records.map((record) => Object.fromEntries(headers.map((header, idx) => [header, record[idx] ?? ""])));
    }

    const evoRows = parseCsv(document.getElementById("evo-data").textContent.trim());
    const skillRows = parseCsv(document.getElementById("skill-data").textContent.trim());
    const entries = evoRows.map((row) => ({
      ...row,
      name_ko: MODELMON_NAMES[row.dex_no],
      accent: MODELMON_COLORS[row.dex_no],
      skill: skillRows.find((skill) => skill.skill_no === row.dex_no)
    }));

    function makeText(text, size, fill, x, y, anchorX = 0, anchorY = 0) {
      const node = new PIXI.Text({
        text,
        style: {
          fontFamily: "Courier New",
          fontSize: size,
          fontWeight: "700",
          fill,
          letterSpacing: 1,
          lineHeight: size + 4
        }
      });
      node.anchor.set(anchorX, anchorY);
      node.position.set(Math.round(x), Math.round(y));
      node.roundPixels = true;
      return node;
    }

    function pixelBox(container, x, y, w, h, fill, line = 0x000000, alpha = 0.16) {
      const g = new PIXI.Graphics();
      g.rect(x, y, w, h).fill(fill).stroke({ color: line, width: 2, alpha, alignment: 1 });
      container.addChild(g);
      return g;
    }

    function drawGlyph(container, x, y, size, accent, id) {
      pixelBox(container, x, y, size, size, 0xeadbc0, 0x372b25, 0.2);
      pixelBox(container, x + 6, y + 6, size - 12, size - 12, 0xf8efdf, 0x372b25, 0.06);
      pixelBox(container, x + size * 0.24, y + size * 0.18, size * 0.52, size * 0.52, accent, 0x372b25, 0.12);
      pixelBox(container, x + size * 0.34, y + size * 0.28, size * 0.32, size * 0.32, 0xfffbf2, 0x372b25, 0.04);
      pixelBox(container, x + size * 0.22, y + size * 0.74, size * 0.56, 8, 0xc8b79c, 0x372b25, 0.04);
      container.addChild(makeText(id, Math.max(10, Math.floor(size * 0.12)), 0x5d4b40, x + size / 2, y + size / 2, 0.5, 0.5));
    }

    async function main() {
      const app = new PIXI.Application();
      await app.init({
        resizeTo: appHost,
        backgroundAlpha: 0,
        antialias: false,
        autoDensity: true,
        resolution: Math.min(window.devicePixelRatio || 1, 2)
      });
      app.canvas.style.imageRendering = "pixelated";
      appHost.appendChild(app.canvas);

      const state = { selected: "001" };

      function render() {
        const w = app.screen.width;
        const h = app.screen.height;
        app.stage.removeChildren();

        const root = new PIXI.Container();
        root.roundPixels = true;
        app.stage.addChild(root);

        pixelBox(root, 0, 0, w, h, 0x1d1714, 0x1d1714, 0);
        pixelBox(root, 10, 10, w - 20, h - 20, 0xbfa071, 0x000000, 0.1);
        pixelBox(root, 16, 16, w - 32, h - 32, 0xf0ddbc, 0x3a2d26, 0.14);

        const selected = entries.find((entry) => entry.dex_no === state.selected) ?? entries[0];
        const innerX = 28;
        const innerW = w - 56;

        pixelBox(root, innerX, 28, innerW, 84, 0x312722, 0x000000, 0.18);
        root.addChild(makeText("MODELMON DEX", 18, 0xfff5e6, innerX + 14, 44));
        root.addChild(makeText("원작 계열 정보는 src/data 기준", 11, 0xd8c3a5, innerX + 14, 68));
        root.addChild(makeText(`NO.${selected.dex_no}`, 12, selected.accent, innerX + innerW - 14, 44, 1, 0));
        root.addChild(makeText(selected.name_ko, 12, 0xffd26f, innerX + innerW - 14, 66, 1, 0));

        const heroY = 124;
        const heroH = 214;
        pixelBox(root, innerX, heroY, innerW, heroH, 0xe5cfaa, 0x3a2d26, 0.12);
        pixelBox(root, innerX + 8, heroY + 8, innerW - 16, heroH - 16, 0xf9efdc, 0x3a2d26, 0.04);
        drawGlyph(root, innerX + 18, heroY + 22, 120, selected.accent, selected.dex_no);
        root.addChild(makeText(selected.name_ko, 20, 0x2a211c, innerX + 154, heroY + 26));
        root.addChild(makeText(`배정 브랜드 ${selected.assigned_brand}`, 12, 0x746457, innerX + 154, heroY + 56));
        root.addChild(makeText(`원작 계열 ${selected.line_name}`, 12, 0x746457, innerX + 154, heroY + 82));
        root.addChild(makeText(`도감 범위 ${selected.dex_range}`, 12, 0x746457, innerX + 154, heroY + 106));
        root.addChild(makeText(`진화 단계 ${selected.stage_index} / ${selected.stage_count}`, 12, 0x746457, innerX + 154, heroY + 130));
        root.addChild(makeText(`계열 멤버 ${selected.members}`, 12, 0x746457, innerX + 154, heroY + 154));
        root.addChild(makeText("원작 포켓몬 상세 축을 계열 단위로 표시", 11, 0xa47f4e, innerX + 154, heroY + 184));

        const skillY = heroY + heroH + 14;
        pixelBox(root, innerX, skillY, innerW, 132, 0xf3e6cf, 0x3a2d26, 0.12);
        root.addChild(makeText("전투 표본", 13, 0x2a211c, innerX + 12, skillY + 12));
        root.addChild(makeText(selected.skill.skill_name_ko, 17, selected.accent, innerX + 12, skillY + 34));
        root.addChild(makeText(`${selected.skill.ai_element} · ${selected.skill.ai_pattern}`, 11, 0x6f6053, innerX + 12, skillY + 58));
        root.addChild(makeText(`상태군 ${selected.skill.ai_status_family_ko}`, 11, 0x6f6053, innerX + 12, skillY + 78));
        root.addChild(makeText(`위력 ${selected.skill.power} · 명중 ${selected.skill.accuracy} · PP ${selected.skill.pp}`, 11, 0x6f6053, innerX + 12, skillY + 98));
        root.addChild(makeText(selected.skill.effect_ko, 11, 0x2a211c, innerX + 12, skillY + 118));

        const gridTitleY = skillY + 146;
        root.addChild(makeText("도감 선택", 13, 0x2a211c, innerX, gridTitleY));

        const cols = 3;
        const gap = 10;
        const cellW = Math.floor((innerW - gap * (cols - 1)) / cols);
        const cellH = 88;
        entries.forEach((entry, index) => {
          const col = index % cols;
          const row = Math.floor(index / cols);
          const x = innerX + col * (cellW + gap);
          const y = gridTitleY + 16 + row * (cellH + gap);
          const active = entry.dex_no === state.selected;

          const hit = pixelBox(root, x, y, cellW, cellH, active ? 0x2f2723 : 0xf6ead6, 0x3a2d26, active ? 0.18 : 0.08);
          hit.eventMode = "static";
          hit.cursor = "pointer";
          hit.on("pointertap", () => {
            state.selected = entry.dex_no;
            render();
          });

          if (active) {
            pixelBox(root, x + 4, y + 4, cellW - 8, cellH - 8, 0x43342d, 0x3a2d26, 0.04);
          }

          drawGlyph(root, x + 10, y + 12, 42, entry.accent, entry.dex_no);
          root.addChild(makeText(entry.name_ko, 11, active ? 0xfff5e6 : 0x2a211c, x + 60, y + 16));
          root.addChild(makeText(entry.line_id, 10, active ? entry.accent : 0x7c6b5c, x + 60, y + 36));
          root.addChild(makeText(`${entry.stage_index}/${entry.stage_count} 단계`, 10, active ? 0xdcc7aa : 0x7c6b5c, x + 60, y + 54));
        });

        const footerY = h - 58;
        pixelBox(root, innerX, footerY, innerW, 30, 0xdbc39f, 0x3a2d26, 0.08);
        root.addChild(makeText("gen1-evo-lines.csv + modelmon-skill-dex-gen1-battle.csv 기반", 10, 0x5d4b40, innerX + 10, footerY + 9));
      }

      render();
      window.addEventListener("resize", render);
    }

    main().catch((error) => {
      appHost.innerHTML = `<div style="padding:20px;color:#fff5e6;font:14px/1.6 monospace">화면을 그리지 못했습니다.<br>${error.message}</div>`;
    });
  </script>
</body>
</html>
