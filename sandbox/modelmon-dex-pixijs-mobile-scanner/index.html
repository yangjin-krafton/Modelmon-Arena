<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>모델몬 스캐너 도감</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d1917;
    }
    #app {
      width: 100vw;
      height: 100vh;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.13.0/dist/pixi.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const host = document.getElementById("app");
    const items = [
      { no: "001", name: "지피티삼점오", tag: "대화", color: 0x68f0c2 },
      { no: "052", name: "가드레일", tag: "정렬", color: 0x77d4f2 },
      { no: "094", name: "오염스모그", tag: "오염", color: 0xcc7cff },
      { no: "131", name: "메모리스포어", tag: "기억", color: 0xafe26d },
      { no: "150", name: "울트라볼트", tag: "시스템", color: 0xffd56f }
    ];

    function box(container, x, y, w, h, fill, stroke = 0xffffff, alpha = 0.08) {
      const g = new PIXI.Graphics();
      g.rect(x, y, w, h).fill(fill).stroke({ color: stroke, width: 2, alpha, alignment: 1 });
      container.addChild(g);
      return g;
    }

    function tx(text, size, color, x, y, anchorX = 0, anchorY = 0) {
      const node = new PIXI.Text({
        text,
        style: {
          fontFamily: "Courier New",
          fontSize: size,
          fontWeight: "700",
          fill: color,
          letterSpacing: 1
        }
      });
      node.anchor.set(anchorX, anchorY);
      node.position.set(Math.round(x), Math.round(y));
      node.roundPixels = true;
      return node;
    }

    function radarGlyph(root, cx, cy, size, accent, no) {
      const g = new PIXI.Graphics();
      for (let i = 0; i < 4; i += 1) {
        g.rect(cx - size / 2 + i * 10, cy - size / 2 + i * 10, size - i * 20, size - i * 20)
          .stroke({ color: accent, width: 2, alpha: 0.22 });
      }
      g.moveTo(cx - size / 2, cy).lineTo(cx + size / 2, cy).stroke({ color: accent, width: 2, alpha: 0.14 });
      g.moveTo(cx, cy - size / 2).lineTo(cx, cy + size / 2).stroke({ color: accent, width: 2, alpha: 0.14 });
      g.circle(cx, cy, 10).fill({ color: accent, alpha: 0.24 }).stroke({ color: accent, width: 2, alpha: 0.5 });
      root.addChild(g);
      root.addChild(tx(no, 14, 0xeafff6, cx, cy, 0.5, 0.5));
    }

    async function main() {
      const app = new PIXI.Application();
      await app.init({
        resizeTo: host,
        backgroundAlpha: 0,
        antialias: false,
        autoDensity: true,
        resolution: Math.min(window.devicePixelRatio || 1, 2)
      });
      app.canvas.style.imageRendering = "pixelated";
      host.appendChild(app.canvas);

      function render() {
        const w = app.screen.width;
        const h = app.screen.height;
        app.stage.removeChildren();
        const root = new PIXI.Container();
        root.roundPixels = true;
        app.stage.addChild(root);

        const bg = new PIXI.Graphics();
        bg.rect(0, 0, w, h).fill(0x0d1817);
        bg.rect(0, 0, w, h).stroke({ color: 0x68f0c2, width: 2, alpha: 0.06 });
        for (let y = 0; y < h; y += 20) {
          bg.moveTo(0, y).lineTo(w, y).stroke({ color: 0x68f0c2, width: 1, alpha: 0.05 });
        }
        root.addChild(bg);

        box(root, 14, 14, w - 28, h - 28, 0x132523, 0x68f0c2, 0.12);
        box(root, 22, 22, w - 44, h - 44, 0x0f1d1c, 0x68f0c2, 0.04);

        root.addChild(tx("SCAN LOG", 12, 0x68f0c2, 32, 34));
        root.addChild(tx("MODELMON FIELD INDEX", 18, 0xeafff6, 32, 54));
        root.addChild(tx("LOCK 05", 12, 0xffd56f, w - 32, 34, 1, 0));

        const radarY = 96;
        const radarH = 256;
        box(root, 32, radarY, w - 64, radarH, 0x142927, 0x68f0c2, 0.08);
        radarGlyph(root, w / 2, radarY + 114, 170, items[0].color, items[0].no);
        root.addChild(tx("ACTIVE TARGET", 12, 0x7edfc9, 48, radarY + 22));
        root.addChild(tx(items[0].name, 20, 0xeafff6, 48, radarY + 196));
        root.addChild(tx(`속성 ${items[0].tag}`, 12, 0x9dc8c0, 48, radarY + 224));
        root.addChild(tx("스캐너형 메인 카드", 12, 0xffd56f, 48, radarY + 248));

        const readoutY = radarY + radarH + 14;
        box(root, 32, readoutY, w - 64, 52, 0x183230, 0x68f0c2, 0.08);
        root.addChild(tx("READOUT", 12, 0x68f0c2, 46, readoutY + 12));
        root.addChild(tx("도감 화면을 스캔 장비처럼 보이게 만든 컨셉", 12, 0xd9fff5, 46, readoutY + 30));

        const listY = readoutY + 66;
        root.addChild(tx("QUEUE", 13, 0xeafff6, 32, listY));

        items.forEach((item, index) => {
          const y = listY + 26 + index * 72;
          box(root, 32, y, w - 64, 60, 0x142927, 0x68f0c2, 0.06);
          const icon = new PIXI.Graphics();
          icon.circle(62, y + 30, 16).fill({ color: item.color, alpha: 0.22 }).stroke({ color: item.color, width: 2, alpha: 0.54 });
          root.addChild(icon);
          root.addChild(tx(item.no, 10, 0xeafff6, 62, y + 30, 0.5, 0.5));
          root.addChild(tx(item.name, 13, 0xeafff6, 92, y + 16));
          root.addChild(tx(item.tag, 11, 0x93bdb5, 92, y + 34));
          root.addChild(tx(index === 0 ? "TRACKING" : "SIGNAL", 10, index === 0 ? 0xffd56f : 0x68f0c2, w - 50, y + 22, 1, 0));
        });

        box(root, 32, h - 76, w - 64, 42, 0x183230, 0x68f0c2, 0.08);
        root.addChild(tx("SCAN", 12, 0xffd56f, 56, h - 61));
        root.addChild(tx("INDEX", 12, 0xeafff6, w / 2, h - 61, 0.5, 0));
        root.addChild(tx("LOG", 12, 0xeafff6, w - 56, h - 61, 1, 0));
      }

      render();
      window.addEventListener("resize", render);
    }

    main();
  </script>
</body>
</html>
