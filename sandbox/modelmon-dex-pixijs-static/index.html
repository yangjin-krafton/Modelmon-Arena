<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모델몬 도감 PixiJS 샘플</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #efe7d7;
      --panel: #f8f3ea;
      --line: #2d2b26;
      --ink: #1e1c19;
      --muted: #706758;
      --accent: #d66c45;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(214, 108, 69, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(86, 166, 160, 0.14), transparent 26%),
        linear-gradient(180deg, #f7f0e4 0%, #e8ddc9 100%);
      color: var(--ink);
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .frame {
      width: min(1440px, 100%);
      height: min(900px, calc(100vh - 32px));
      border: 2px solid rgba(45, 43, 38, 0.18);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 28px 80px rgba(40, 34, 28, 0.18);
      background: rgba(255, 252, 246, 0.78);
      backdrop-filter: blur(12px);
    }

    #app {
      width: 100%;
      height: 100%;
    }

    .notice {
      position: fixed;
      left: 18px;
      bottom: 18px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(30, 28, 25, 0.8);
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.02em;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.13.0/dist/pixi.min.js"></script>
</head>
<body>
  <div class="frame">
    <div id="app"></div>
  </div>
  <div class="notice">정적 샘플 화면 · 기능 없음</div>

  <script>
    const TOTAL_ENTRIES = 151;
    const FEATURED_IDS = ["001", "004", "007", "025", "039", "052", "094", "131", "150"];
    const FEATURED_NAMES = {
      "001": "모델몬 001",
      "004": "모델몬 004",
      "007": "모델몬 007",
      "025": "모델몬 025",
      "039": "모델몬 039",
      "052": "모델몬 052",
      "094": "모델몬 094",
      "131": "모델몬 131",
      "150": "모델몬 150"
    };

    function rangeIds(total) {
      return Array.from({ length: total }, (_, index) => String(index + 1).padStart(3, "0"));
    }

    function label(style, text, x, y, anchorX = 0, anchorY = 0) {
      const node = new PIXI.Text({ text, style });
      node.position.set(x, y);
      node.anchor.set(anchorX, anchorY);
      return node;
    }

    function roundedPanel(width, height, fill, stroke, strokeWidth = 2, radius = 24) {
      const g = new PIXI.Graphics();
      g.roundRect(0, 0, width, height, radius).fill(fill).stroke({ color: stroke, width: strokeWidth, alpha: 0.18 });
      return g;
    }

    function createDexGlyph(width, height, accent, labelText) {
      const wrap = new PIXI.Container();

      const plate = new PIXI.Graphics();
      plate.roundRect(0, 0, width, height, Math.min(28, width * 0.18)).fill(0xefe5d3).stroke({ color: 0x2d2b26, width: 2, alpha: 0.12 });
      plate.circle(width * 0.5, height * 0.42, Math.min(width, height) * 0.22).fill({ color: accent, alpha: 0.16 });
      plate.roundRect(width * 0.24, height * 0.65, width * 0.52, height * 0.12, 999).fill({ color: 0x2d2b26, alpha: 0.08 });
      wrap.addChild(plate);

      const ring = new PIXI.Graphics();
      ring.circle(width * 0.5, height * 0.42, Math.min(width, height) * 0.16).stroke({ color: accent, width: 4, alpha: 0.6 });
      ring.circle(width * 0.5, height * 0.42, Math.min(width, height) * 0.09).fill({ color: accent, alpha: 0.22 });
      wrap.addChild(ring);

      const labelNode = new PIXI.Text({
        text: labelText,
        style: {
          fill: 0x5f574d,
          fontSize: Math.max(10, Math.floor(width * 0.11)),
          fontWeight: "700",
          fontFamily: "Noto Sans KR"
        }
      });
      labelNode.anchor.set(0.5);
      labelNode.position.set(width * 0.5, height * 0.42);
      wrap.addChild(labelNode);

      return wrap;
    }

    async function main() {
      const app = new PIXI.Application();
      await app.init({
        resizeTo: document.getElementById("app"),
        backgroundAlpha: 0,
        antialias: true
      });

      document.getElementById("app").appendChild(app.canvas);

      const ids = rangeIds(TOTAL_ENTRIES);

      const stage = app.stage;

      function renderScene() {
        const width = app.screen.width;
        const height = app.screen.height;
        stage.removeChildren();

        const root = new PIXI.Container();
        stage.addChild(root);

        const bg = new PIXI.Graphics();
        bg.rect(0, 0, width, height).fill(0xf3ecdf);
        bg.circle(width * 0.12, height * 0.1, width * 0.18).fill({ color: 0xd66c45, alpha: 0.08 });
        bg.circle(width * 0.92, height * 0.84, width * 0.22).fill({ color: 0x56a6a0, alpha: 0.08 });
        bg.roundRect(18, 18, width - 36, height - 36, 30).stroke({ color: 0x2d2b26, width: 2, alpha: 0.08 });
        root.addChild(bg);

        const titleStyle = new PIXI.TextStyle({
          fill: 0x1e1c19,
          fontSize: Math.max(32, Math.floor(width * 0.026)),
          fontWeight: "700",
          fontFamily: "Noto Sans KR"
        });

        const bodyStyle = new PIXI.TextStyle({
          fill: 0x5f574d,
          fontSize: Math.max(14, Math.floor(width * 0.0115)),
          lineHeight: 26,
          fontFamily: "Noto Sans KR"
        });

        const smallStyle = new PIXI.TextStyle({
          fill: 0x776e61,
          fontSize: Math.max(12, Math.floor(width * 0.0095)),
          letterSpacing: 1.2,
          fontWeight: "700",
          fontFamily: "Noto Sans KR"
        });

        root.addChild(label(smallStyle, "PIXIJS 정적 샘플", 44, 38));
        root.addChild(label(titleStyle, "모델몬 도감 목업", 44, 60));
        root.addChild(label(bodyStyle, "좌측은 대표 개체 카드, 우측은 전체 도감 썸네일 벽입니다. 화면 연출만 있고 기능은 붙이지 않았습니다.", 44, 104));

        const leftW = Math.min(430, width * 0.31);
        const leftX = 36;
        const topY = 152;
        const contentH = height - topY - 28;
        const rightX = leftX + leftW + 24;
        const rightW = width - rightX - 36;

        const profilePanel = roundedPanel(leftW, contentH, 0xfcf8f0, 0x2d2b26);
        profilePanel.position.set(leftX, topY);
        root.addChild(profilePanel);

        const featuredId = "001";
        const heroCard = roundedPanel(leftW - 32, 360, 0xf1e8d9, 0x2d2b26, 2, 28);
        heroCard.position.set(leftX + 16, topY + 16);
        root.addChild(heroCard);

        const heroGlyph = createDexGlyph(220, 220, 0xd66c45, featuredId);
        heroGlyph.position.set(leftX + leftW / 2 - 110, topY + 78);
        root.addChild(heroGlyph);

        const ring = new PIXI.Graphics();
        ring.circle(leftX + leftW / 2, topY + 188, 112).stroke({ color: 0xd66c45, width: 4, alpha: 0.2 });
        ring.circle(leftX + leftW / 2, topY + 188, 136).stroke({ color: 0x2d2b26, width: 2, alpha: 0.08 });
        root.addChild(ring);

        root.addChild(label(smallStyle, "NO. 001", leftX + 34, topY + 34));
        root.addChild(label(titleStyle, "모델몬 도감 대표 표본", leftX + 34, topY + 58));
        root.addChild(label(bodyStyle, "기본 카드 영역, 수치 카드, 진화 라인, 설명문이 함께 보이는 도감 레이아웃 샘플입니다.", leftX + 34, topY + 308));

        const statNames = ["전투 원소", "상태군", "표시 형식", "데이터 축"];
        const statValues = ["대화 / 추론 / 생성", "직접형 / 정지 / 속박", "대형 카드 + 썸네일", "실전 CSV 기준"];
        const statY = topY + 402;
        for (let i = 0; i < statNames.length; i += 1) {
          const y = statY + i * 72;
          const card = roundedPanel(leftW - 32, 58, 0xfffcf7, 0x2d2b26, 2, 18);
          card.position.set(leftX + 16, y);
          root.addChild(card);
          root.addChild(label(smallStyle, statNames[i], leftX + 34, y + 14));
          root.addChild(label(bodyStyle, statValues[i], leftX + 34, y + 30));
        }

        const stripPanel = roundedPanel(leftW - 32, 122, 0xfcf8f0, 0x2d2b26, 2, 24);
        stripPanel.position.set(leftX + 16, height - 150);
        root.addChild(stripPanel);
        root.addChild(label(smallStyle, "대표 샘플 라인업", leftX + 34, height - 132));

        FEATURED_IDS.forEach((id, index) => {
          const item = new PIXI.Container();
          const cell = roundedPanel(38, 58, 0xf0e7d8, 0x2d2b26, 1, 12);
          const dot = new PIXI.Graphics();
          dot.circle(19, 22, 9).fill({ color: 0xd66c45, alpha: 0.18 }).stroke({ color: 0xd66c45, width: 2, alpha: 0.42 });
          const no = label(new PIXI.TextStyle({
            fill: 0x6a6258,
            fontSize: 8,
            fontWeight: "700",
            fontFamily: "Noto Sans KR"
          }), id, 19, 46, 0.5, 0);

          item.position.set(leftX + 28 + index * 42, height - 112);
          item.addChild(cell, dot, no);
          root.addChild(item);
        });

        const rightPanel = roundedPanel(rightW, contentH, 0xfcf8f0, 0x2d2b26);
        rightPanel.position.set(rightX, topY);
        root.addChild(rightPanel);

        root.addChild(label(smallStyle, "전체 도감 썸네일", rightX + 22, topY + 18));
        root.addChild(label(bodyStyle, "001부터 151까지를 작게 펼쳐 둔 벽면 샘플입니다. 정렬, 선택, 스크롤 기능은 아직 붙이지 않았습니다.", rightX + 22, topY + 40));

        const grid = new PIXI.Container();
        grid.position.set(rightX + 20, topY + 96);
        root.addChild(grid);

        const cols = width > 1220 ? 10 : width > 980 ? 8 : 6;
        const gap = 10;
        const cellW = Math.floor((rightW - 40 - gap * (cols - 1)) / cols);
        const cellH = 84;

        ids.forEach((id, index) => {
          const col = index % cols;
          const row = Math.floor(index / cols);
          const x = col * (cellW + gap);
          const y = row * (cellH + gap);
          if (y > contentH - 140) return;

          const tile = new PIXI.Container();
          tile.position.set(x, y);

          const shell = roundedPanel(cellW, cellH, 0xfffcf7, 0x2d2b26, 1, 16);
          tile.addChild(shell);

          const slot = new PIXI.Graphics();
          slot.roundRect(10, 10, cellW - 20, 48, 14).fill({ color: 0xeee2cd, alpha: 0.9 });
          tile.addChild(slot);

          const glyph = createDexGlyph(cellW - 20, 48, index % 3 === 0 ? 0xd66c45 : index % 3 === 1 ? 0x56a6a0 : 0x6c71d9, id);
          glyph.position.set(10, 10);
          tile.addChild(glyph);

          const idText = label(new PIXI.TextStyle({
            fill: 0x2c2924,
            fontSize: 10,
            fontWeight: "700",
            letterSpacing: 0.5,
            fontFamily: "Noto Sans KR"
          }), `NO. ${id}`, 10, 62);
          const nameText = label(new PIXI.TextStyle({
            fill: 0x706758,
            fontSize: 9,
            fontFamily: "Noto Sans KR"
          }), FEATURED_NAMES[id] || `모델몬 ${id}`, 10, 72);

          tile.addChild(idText, nameText);
          grid.addChild(tile);
        });
      }

      renderScene();
      window.addEventListener("resize", renderScene);
    }

    main().catch((error) => {
      const app = document.getElementById("app");
      app.innerHTML = `<div style="padding:24px;font:16px/1.6 sans-serif;color:#1e1c19">PixiJS 샘플을 그리지 못했습니다.<br>${error.message}</div>`;
    });
  </script>
</body>
</html>
