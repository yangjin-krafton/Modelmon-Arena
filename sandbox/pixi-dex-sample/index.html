function bdr(g,x,y,w,h,c,lw,r){g.stroke({color:c,width:lw||1});r?g.roundRect(x,y,w,h,r):g.rect(x,y,w,h);g.stroke();}
function tx(s,sz,c){return new PIXI.Text({text:s,style:{fontFamily:'"Courier New",monospace',fontSize:sz,fill:c||P.white}});}

/* ============================================================
   PIXEL MONSTER GENERATOR (brand colored)
   ============================================================ */
function makeMonster(dexNo,size){
  const info=dexMap[dexNo]||{brand:'IBM'};
  const bc=getBrandColor(info.brand,0);
  const bc2=getBrandColor(info.brand,1);
  const bc3=getBrandColor(info.brand,2);
  const bodyC=rgb2hex(...bc);
  const darkC=rgb2hex(...bc2);
  const lightC=rgb2hex(...bc3);

  const c=new PIXI.Container();
  const g=new PIXI.Graphics();
  let seed=dexNo*2654435761;
  const rand=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};

  const PX=Math.max(1,Math.floor(size/12));
  const HALF=5,ROWS=10;
  const tw=HALF*2*PX, th=ROWS*PX;
  const ox=Math.floor((size-tw)/2), oy=Math.floor((size-th)/2);

  const pat=[];
  for(let r=0;r<ROWS;r++){
    pat[r]=[];
    for(let col=0;col<HALF;col++){
      let prob=col>=HALF-2?0.78:col<1?0.22:0.50;
      if(r<=1||r>=ROWS-2)prob*=0.45;
      pat[r][col]=rand()<prob?1:0;
    }
  }
  for(let r=2;r<ROWS-2;r++)
    for(let col=HALF-3;col<HALF;col++)pat[r][col]=1;

  for(let r=0;r<ROWS;r++){
    for(let col=0;col<HALF;col++){
      if(!pat[r][col])continue;
      const edge=!pat[r]?.[col-1]||r===0||r===ROWS-1||!pat[r-1]?.[col]||!pat[r+1]?.[col];
      const clr=edge?lightC:bodyC;
      rect(g,ox+(HALF-1-col)*PX,oy+r*PX,PX,PX,clr);
      rect(g,ox+(HALF+col)*PX,oy+r*PX,PX,PX,clr);
    }
  }
  // Shadow
  for(let col=0;col<HALF;col++){
    for(let r=ROWS-3;r<ROWS;r++){
      if(pat[r]?.[col]){
        rect(g,ox+(HALF-1-col)*PX,oy+r*PX,PX,PX,darkC);
        rect(g,ox+(HALF+col)*PX,oy+r*PX,PX,PX,darkC);
      }
    }
  }
  // Eyes
  const er=Math.floor(ROWS*0.3);
  const ec=1+Math.floor(rand()*2);
  rect(g,ox+(HALF-ec)*PX,oy+er*PX,PX,PX,0xffffff);
  rect(g,ox+(HALF+ec-1)*PX,oy+er*PX,PX,PX,0xffffff);

  c.addChild(g);
  return c;
}

  cell.x=cx;cell.y=cy;
  cell.eventMode='static';cell.cursor='pointer';

  const info=dexMap[i+1]||{};
  const bc=getBrandColor(info.brand||'IBM',0);
  const bgColor=rgb2hex(Math.floor(bc[0]*0.15+10),Math.floor(bc[1]*0.15+12),Math.floor(bc[2]*0.15+18));

  const bg=new PIXI.Graphics();
  rect(bg,0,0,CELL,CELL,bgColor,3);
  bdr(bg,0,0,CELL,CELL,P.border,1,3);
  cell.addChild(bg);

  const mon=makeMonster(i+1,CELL-6);
  mon.x=3;mon.y=1;
  cell.addChild(mon);

  const num=tx(String(i+1).padStart(3,'0'),7,P.grayDk);
  num.x=2;num.y=CELL-10;
  cell.addChild(num);

  cell.on('pointerdown',()=>{ selectedIdx=i; showDetail(); });
  scrollContent.addChild(cell);
}
scrollContent.addChild(selGfx);

function updateGridSel(){
  selGfx.clear();
  const col=selectedIdx%COLS, row=Math.floor(selectedIdx/COLS);
  bdr(selGfx,col*(CELL+CELL_GAP)-1,row*ROW_H-1,CELL+2,CELL+2,P.accent,2,4);
}
updateGridSel();

// Scrollbar
const SB_W=3;
const sbTrack=new PIXI.Graphics();
rect(sbTrack,GW-SIDE_PAD,2,SB_W,GRID_H-4,P.black,1);
gridView.addChild(sbTrack);
const sbThumb=new PIXI.Graphics();
gridView.addChild(sbThumb);

function refreshSb(){
  sbThumb.clear();
  if(contentH<=viewH)return;
  const tH=Math.max(14,(viewH/contentH)*(GRID_H-4));
  const ratio=-scrollContent.y/(contentH-viewH);
  const tY=2+ratio*(GRID_H-4-tH);
  rect(sbThumb,GW-SIDE_PAD,tY,SB_W,tH,P.gray,1);
}
refreshSb();

// Touch scroll
let dragging=false,dragY0=0,scrollY0=0,vel=0,lastDY=0,lastDT=0,wasDrag=false;
const scrollHit=new PIXI.Graphics();
rect(scrollHit,0,0,GW,GRID_H,0xff0000);scrollHit.alpha=0;scrollHit.eventMode='static';
gridView.addChild(scrollHit);

scrollHit.on('pointerdown',e=>{
  dragging=true;wasDrag=false;vel=0;
  dragY0=e.global.y/fit;scrollY0=scrollContent.y;lastDY=dragY0;lastDT=performance.now();
});
scrollHit.on('pointermove',e=>{
  if(!dragging)return;
  const y=e.global.y/fit;
  const dy=y-dragY0;
  if(Math.abs(dy)>4)wasDrag=true;
  scrollContent.y=Math.max(minScroll,Math.min(0,scrollY0+dy));
  const now=performance.now(),dt=now-lastDT;
  if(dt>0)vel=(y-lastDY)/dt*16;
  lastDY=y;lastDT=now;
  refreshSb();
});
const onUp=e=>{
  if(!dragging)return;
  dragging=false;
  if(!wasDrag){
    // Tap — find cell
    const lx=(e.global.x/fit)-gridOx;
    const ly=(e.global.y/fit)-(HDR+4)-scrollContent.y;
    const col=Math.floor(lx/(CELL+CELL_GAP));
    const row=Math.floor(ly/ROW_H);
    if(col>=0&&col<COLS){
      const idx=row*COLS+col;
      if(idx>=0&&idx<151){selectedIdx=idx;showDetail();}
    }
  }
};
scrollHit.on('pointerup',onUp);
scrollHit.on('pointerupoutside',onUp);

app.ticker.add(()=>{
  if(!dragging&&Math.abs(vel)>0.2){
    scrollContent.y=Math.max(minScroll,Math.min(0,scrollContent.y+vel));
    vel*=0.92;refreshSb();
  }
});

// ── DETAIL VIEW ──
const detailView=new PIXI.Container();
detailView.visible=false;
root.addChild(detailView);

// Back button area
const backBtn=new PIXI.Container();
backBtn.y=HDR+6;backBtn.x=10;backBtn.eventMode='static';backBtn.cursor='pointer';
const backBg=new PIXI.Graphics();
rect(backBg,0,0,50,24,P.panelLt,4);bdr(backBg,0,0,50,24,P.border,1,4);
backBtn.addChild(backBg);
const backTx=tx('< 목록',9,P.gray);backTx.x=6;backTx.y=5;backBtn.addChild(backTx);
backBtn.on('pointerdown',()=>{viewMode='grid';detailView.visible=false;gridView.visible=true;updateGridSel();});
detailView.addChild(backBtn);

// Monster showcase
const SHOW_Y=HDR+38;
const SHOW_H=150;
const showBg=new PIXI.Graphics();
detailView.addChild(showBg);
const showMon=new PIXI.Container();
detailView.addChild(showMon);

// Scanlines
const scanG=new PIXI.Graphics();
scanG.alpha=0.05;
detailView.addChild(scanG);

// Info section
const infoY=SHOW_Y+SHOW_H+8;
const infoBg=new PIXI.Graphics();
detailView.addChild(infoBg);

const dNoTx=tx('',10,P.gray);detailView.addChild(dNoTx);
const dNameTx=tx('',16,P.white);detailView.addChild(dNameTx);
const dPokeTx=tx('',9,P.grayDk);detailView.addChild(dPokeTx);
const dBrandBg=new PIXI.Graphics();detailView.addChild(dBrandBg);
const dBrandTx=tx('',10,P.white);detailView.addChild(dBrandTx);
const dEvoTx=tx('',9,P.gray);detailView.addChild(dEvoTx);
const dStageTx=tx('',9,P.white);detailView.addChild(dStageTx);

// Stat display
const statLabels=['HP','ATK','DEF','SPD'];
const statColors=[P.green,P.red,P.blue,P.yellow];
const statBarG=[], statValT=[];
for(let i=0;i<4;i++){
  statBarG.push(new PIXI.Graphics());
  detailView.addChild(statBarG[i]);
  statValT.push(tx('',9,statColors[i]));
  detailView.addChild(statValT[i]);
}
const statLabelTs=statLabels.map((l,i)=>{const t=tx(l,8,P.gray);detailView.addChild(t);return t;});

// Evo line preview
const evoContainer=new PIXI.Container();
detailView.addChild(evoContainer);
const evoLabel=tx('진화 라인',9,P.gray);
detailView.addChild(evoLabel);

// Nav arrows
const prevBtn=new PIXI.Container();prevBtn.eventMode='static';prevBtn.cursor='pointer';
const prevBg=new PIXI.Graphics();rect(prevBg,0,0,44,36,P.panelLt,4);bdr(prevBg,0,0,44,36,P.border,1,4);
prevBtn.addChild(prevBg);const prevTx=tx('<',14,P.gray);prevTx.x=16;prevTx.y=8;prevBtn.addChild(prevTx);
prevBtn.on('pointerdown',()=>{if(selectedIdx>0){selectedIdx--;refreshDetail();}});
detailView.addChild(prevBtn);

const nextBtn=new PIXI.Container();nextBtn.eventMode='static';nextBtn.cursor='pointer';
const nextBg=new PIXI.Graphics();rect(nextBg,0,0,44,36,P.panelLt,4);bdr(nextBg,0,0,44,36,P.border,1,4);
nextBtn.addChild(nextBg);const nextTx=tx('>',14,P.gray);nextTx.x=16;nextTx.y=8;nextBtn.addChild(nextTx);
nextBtn.on('pointerdown',()=>{if(selectedIdx<150){selectedIdx++;refreshDetail();}});
detailView.addChild(nextBtn);

function refreshDetail(){
  const no=selectedIdx+1;
  const info=dexMap[no]||{brand:'IBM',evoLine:'???',stage:1,maxStage:1};
  const bc=getBrandColor(info.brand,0);
  const brandHex=rgb2hex(...bc);

  // Showcase bg
  showBg.clear();
  rect(showBg,8,SHOW_Y,GW-16,SHOW_H,P.panel,6);
  bdr(showBg,8,SHOW_Y,GW-16,SHOW_H,P.border,1,6);
  // Accent stripe
  rect(showBg,8,SHOW_Y,GW-16,4,brandHex,6);

  // Monster
  showMon.removeChildren();
  const mon=makeMonster(no,120);
  mon.x=(GW-120)/2;mon.y=SHOW_Y+18;
  showMon.addChild(mon);

  // Scanlines
  scanG.clear();
  for(let sy=SHOW_Y;sy<SHOW_Y+SHOW_H;sy+=2)rect(scanG,8,sy,GW-16,1,0x000000);

  // Info bg
  infoBg.clear();
  rect(infoBg,8,infoY,GW-16,GH-infoY-50,P.panel,6);
  bdr(infoBg,8,infoY,GW-16,GH-infoY-50,P.border,1,6);

  // Texts
  const noStr=String(no).padStart(3,'0');
  dNoTx.text=`No.${noStr}`;dNoTx.x=20;dNoTx.y=infoY+10;
  dNameTx.text=POKE_NAMES[no-1]||`모델몬${noStr}`;dNameTx.x=20;dNameTx.y=infoY+24;
  dPokeTx.text=`원작: ${evoLines.find(e=>no>=e.start&&no<=e.end)?.name||'???'}`;
  dPokeTx.x=20;dPokeTx.y=infoY+46;

  // Brand badge
  dBrandBg.clear();
  const bw=Math.min(info.brand.length*7+16,GW-60);
  rect(dBrandBg,20,infoY+62,bw,20,brandHex,3);
  dBrandBg.alpha=0.85;
  dBrandTx.text=info.brand;dBrandTx.x=28;dBrandTx.y=infoY+64;

  // Evo / Stage
  dEvoTx.text=`진화: ${info.stage}/${info.maxStage} 단계`;dEvoTx.x=20;dEvoTx.y=infoY+90;
  dStageTx.text=info.evoLine;dStageTx.x=120;dStageTx.y=infoY+90;

  // Stats (seeded)
  let s=no*2654435761;
  const r=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
  const stats=[Math.floor(r()*65+35),Math.floor(r()*65+30),Math.floor(r()*65+30),Math.floor(r()*65+30)];

  const BAR_X=60,BAR_W=GW-120,STAT_BASE=infoY+114;
  statLabels.forEach((_,i)=>{
    statLabelTs[i].x=20;statLabelTs[i].y=STAT_BASE+i*20+2;
    statBarG[i].clear();
    rect(statBarG[i],BAR_X,STAT_BASE+i*20+4,BAR_W,7,P.black,2);
    const w=Math.max(3,(stats[i]/100)*BAR_W);
    rect(statBarG[i],BAR_X,STAT_BASE+i*20+4,w,7,statColors[i],2);
    statValT[i].text=String(stats[i]);
    statValT[i].x=BAR_X+BAR_W+6;statValT[i].y=STAT_BASE+i*20+1;
  });

  // Evo line preview
  evoContainer.removeChildren();
  const evo=evoLines.find(e=>no>=e.start&&no<=e.end);
  if(evo){
    evoLabel.x=20;evoLabel.y=STAT_BASE+90;
    const evoY=STAT_BASE+106;
    const evoSize=36;
    const evoGap=8;
    const totalEvoW=evo.members.length*(evoSize+evoGap)-evoGap;
    let ex=(GW-totalEvoW)/2;
    evo.members.forEach((m,mi)=>{
      const mn=parseInt(m,10);
      const eCell=new PIXI.Container();
      eCell.x=ex;eCell.y=evoY;
      eCell.eventMode='static';eCell.cursor='pointer';

      const ebg=new PIXI.Graphics();
      const isCurrent=mn===no;
      rect(ebg,0,0,evoSize,evoSize,isCurrent?P.panelLt:P.black,3);
      bdr(ebg,0,0,evoSize,evoSize,isCurrent?P.accent:P.border,isCurrent?2:1,3);
      eCell.addChild(ebg);

      const eMon=makeMonster(mn,evoSize-6);
      eMon.x=3;eMon.y=1;
      eCell.addChild(eMon);

      if(mi<evo.members.length-1){
        const arrow=tx('>',10,P.grayDk);
        arrow.x=evoSize+1;arrow.y=12;
        eCell.addChild(arrow);
      }

      eCell.on('pointerdown',()=>{selectedIdx=mn-1;refreshDetail();});
      evoContainer.addChild(eCell);
      ex+=evoSize+evoGap;
    });
  }

  // Nav buttons
  prevBtn.x=10;prevBtn.y=GH-44;
  nextBtn.x=GW-54;nextBtn.y=GH-44;
  prevBtn.alpha=selectedIdx>0?1:0.3;
  nextBtn.alpha=selectedIdx<150?1:0.3;
}

function showDetail(){
  viewMode='detail';
  gridView.visible=false;
  detailView.visible=true;
  refreshDetail();
}

// Detail monster float
let tick=0;
app.ticker.add(()=>{
  tick+=0.04;
  if(detailView.visible&&showMon.children.length>0){
    showMon.children[0].y=SHOW_Y+18+Math.sin(tick)*3;
  }
});

})();
</script>
</body>
</html>
