function bdr(g,x,y,w,h,c,lw,r){g.stroke({color:c,width:lw||1});r?g.roundRect(x,y,w,h,r):g.rect(x,y,w,h);g.stroke();}
function tx(s,sz,c){return new PIXI.Text({text:s,style:{fontFamily:'"Courier New",monospace',fontSize:sz,fill:c||P.white}});}

/* ============================================================
   PIXEL MONSTER GENERATOR (brand colored)
   ============================================================ */
function makeMonster(dexNo,size){
  const info=dexMap[dexNo]||{brand:'IBM'};
  const bc=getBrandColor(info.brand,0);
  const bc2=getBrandColor(info.brand,1);
  const bc3=getBrandColor(info.brand,2);
  const bodyC=rgb2hex(...bc);
  const darkC=rgb2hex(...bc2);
  const lightC=rgb2hex(...bc3);

  const c=new PIXI.Container();
  const g=new PIXI.Graphics();
  let seed=dexNo*2654435761;
  const rand=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};

  const PX=Math.max(1,Math.floor(size/12));
  const HALF=5,ROWS=10;
  const tw=HALF*2*PX, th=ROWS*PX;
  const ox=Math.floor((size-tw)/2), oy=Math.floor((size-th)/2);

  const pat=[];
  for(let r=0;r<ROWS;r++){
    pat[r]=[];
    for(let col=0;col<HALF;col++){
      let prob=col>=HALF-2?0.78:col<1?0.22:0.50;
      if(r<=1||r>=ROWS-2)prob*=0.45;
      pat[r][col]=rand()<prob?1:0;
    }
  }
  for(let r=2;r<ROWS-2;r++)
    for(let col=HALF-3;col<HALF;col++)pat[r][col]=1;

  for(let r=0;r<ROWS;r++){
    for(let col=0;col<HALF;col++){
      if(!pat[r][col])continue;
      const edge=!pat[r]?.[col-1]||r===0||r===ROWS-1||!pat[r-1]?.[col]||!pat[r+1]?.[col];
      const clr=edge?lightC:bodyC;
      rect(g,ox+(HALF-1-col)*PX,oy+r*PX,PX,PX,clr);
      rect(g,ox+(HALF+col)*PX,oy+r*PX,PX,PX,clr);
    }
  }
  // Shadow
  for(let col=0;col<HALF;col++){
    for(let r=ROWS-3;r<ROWS;r++){
      if(pat[r]?.[col]){
        rect(g,ox+(HALF-1-col)*PX,oy+r*PX,PX,PX,darkC);
        rect(g,ox+(HALF+col)*PX,oy+r*PX,PX,PX,darkC);
      }
    }
  }
  // Eyes
  const er=Math.floor(ROWS*0.3);
  const ec=1+Math.floor(rand()*2);
  rect(g,ox+(HALF-ec)*PX,oy+er*PX,PX,PX,0xffffff);
  rect(g,ox+(HALF+ec-1)*PX,oy+er*PX,PX,PX,0xffffff);

  c.addChild(g);
  return c;
}

const statBarG=[];
const statLabelTs=[];
const statValTs=[];
for(let i=0;i<4;i++){
  const lbl=tx(statLabels[i],7,P.gray);
  cardContainer.addChild(lbl);
  statLabelTs.push(lbl);
  const bar=new PIXI.Graphics();
  cardContainer.addChild(bar);
  statBarG.push(bar);
  const val=tx('',8,statColors[i]);
  cardContainer.addChild(val);
  statValTs.push(val);
}

// Separator line between card and strip
const sepLine=new PIXI.Graphics();
rect(sepLine,0,CARD_H-1,GW,2,P.border);
root.addChild(sepLine);

/* ============================================================
   BOTTOM STRIP — horizontal scrolling thumbnails
   ============================================================ */
const stripContainer=new PIXI.Container();
stripContainer.y=STRIP_TOP;
root.addChild(stripContainer);

// Strip background
const stripBg=new PIXI.Graphics();
rect(stripBg,0,0,GW,STRIP_H,P.panel);
stripContainer.addChild(stripBg);

// Label
const stripLabel=tx('COLLECTION',8,P.grayDk);
stripLabel.x=12;stripLabel.y=8;
stripContainer.addChild(stripLabel);

// Counter label
const stripCountTx=tx('001/151',8,P.gray);
stripCountTx.x=GW-60;stripCountTx.y=8;
stripContainer.addChild(stripCountTx);

// Scrolling content area with mask
const stripScrollClip=new PIXI.Container();
stripScrollClip.y=22;
stripContainer.addChild(stripScrollClip);

const stripMask=new PIXI.Graphics();
rect(stripMask,0,STRIP_TOP+22,GW,STRIP_H-22,0xff0000);
root.addChild(stripMask);
stripScrollClip.mask=stripMask;

const stripContent=new PIXI.Container();
stripScrollClip.addChild(stripContent);

// Build all 151 thumbnail cells
const TOTAL_W=151*(CELL_SIZE+CELL_PAD)-CELL_PAD;
const stripCellY=Math.floor((STRIP_H-22-CELL_SIZE)/2);

const selHighlight=new PIXI.Graphics();

for(let i=0;i<151;i++){
  const cx=i*(CELL_SIZE+CELL_PAD);
  const cell=new PIXI.Container();
  cell.x=cx;cell.y=stripCellY;
  cell.eventMode='static';cell.cursor='pointer';

  const info=dexMap[i+1]||{};
  const bc=getBrandColor(info.brand||'IBM',0);
  const bgColor=rgb2hex(
    Math.floor(bc[0]*0.15+10),
    Math.floor(bc[1]*0.15+12),
    Math.floor(bc[2]*0.15+18)
  );

  const bg=new PIXI.Graphics();
  rect(bg,0,0,CELL_SIZE,CELL_SIZE,bgColor,4);
  bdr(bg,0,0,CELL_SIZE,CELL_SIZE,P.border,1,4);
  cell.addChild(bg);

  const mon=makeMonster(i+1,CELL_SIZE-10);
  mon.x=5;mon.y=2;
  cell.addChild(mon);

  const num=tx(String(i+1).padStart(3,'0'),7,P.grayDk);
  num.x=2;num.y=CELL_SIZE-11;
  cell.addChild(num);

  cell.on('pointerdown',()=>{
    selectedIdx=i;
    refreshCard();
    scrollToSelected(true);
  });

  stripContent.addChild(cell);
}
stripContent.addChild(selHighlight);

/* ============================================================
   REFRESH — update card for current selection
   ============================================================ */
function refreshCard(){
  const no=selectedIdx+1;
  const info=dexMap[no]||{brand:'IBM',evoLine:'???',stage:1,maxStage:1};
  const bc=getBrandColor(info.brand,0);
  const bc2=getBrandColor(info.brand,1);
  const brandHex=rgb2hex(...bc);
  const darkHex=rgb2hex(...bc2);

  // Card gradient background
  cardBg.clear();
  // Base dark fill
  rect(cardBg,0,0,GW,CARD_H,P.panel);
  // Top gradient band with brand color (fading down)
  const steps=16;
  for(let i=0;i<steps;i++){
    const t=i/steps;
    const a=0.35*(1-t);
    const r0=bc[0],g0=bc[1],b0=bc[2];
    const r1=0x11,g1=0x15,b1=0x22;
    const cr=Math.floor(r0*a+r1*(1-a));
    const cg=Math.floor(g0*a+g1*(1-a));
    const cb=Math.floor(b0*a+b1*(1-a));
    const h=Math.ceil(CARD_H/steps)+1;
    rect(cardBg,0,Math.floor(t*CARD_H),GW,h,rgb2hex(cr,cg,cb));
  }
  // Accent line at very top
  rect(cardBg,0,0,GW,3,brandHex);

  // No. and Name
  const noStr=String(no).padStart(3,'0');
  cardNoTx.text=`No.${noStr}`;
  cardNameTx.text=POKE_NAMES[no-1]||`MON${noStr}`;

  // Brand badge (top-right)
  brandBadgeBg.clear();
  const brandName=info.brand;
  const bw=Math.min(brandName.length*6.5+14,GW/2);
  const bx=GW-bw-10;
  rect(brandBadgeBg,bx,10,bw,18,brandHex,3);
  brandBadgeBg.alpha=0.9;
  brandBadgeTx.text=brandName;
  brandBadgeTx.x=bx+7;
  brandBadgeTx.y=12;

  // Monster (large, centered)
  monContainer.removeChildren();
  const MON_SIZE=140;
  const mon=makeMonster(no,MON_SIZE);
  mon.x=Math.floor((GW-MON_SIZE)/2);
  mon.y=Math.floor(CARD_H*0.22);
  monContainer.addChild(mon);

  // Evo dots
  evoDotContainer.removeChildren();
  const evo=evoLines.find(e=>no>=e.start&&no<=e.end);
  if(evo){
    const dotR=4;
    const dotGap=14;
    const totalDotsW=evo.members.length*dotGap-dotGap+dotR*2;
    let dx=Math.floor((GW-totalDotsW)/2);
    const dy=Math.floor(CARD_H*0.22)+MON_SIZE+8;
    evo.members.forEach((m,mi)=>{
      const mn=parseInt(m,10);
      const isCurrent=mn===no;
      const dot=new PIXI.Graphics();
      if(isCurrent){
        dot.fill(brandHex);
        dot.circle(dx+dotR,dy,dotR);
        dot.fill();
      }else{
        dot.fill(P.grayDk);
        dot.circle(dx+dotR,dy,dotR-1);
        dot.fill();
      }
      // Make evo dots tappable
      const hitArea=new PIXI.Container();
      hitArea.eventMode='static';hitArea.cursor='pointer';
      const hitGfx=new PIXI.Graphics();
      rect(hitGfx,dx-2,dy-8,dotGap+4,16,0xff0000);
      hitGfx.alpha=0;
      hitArea.addChild(hitGfx);
      hitArea.on('pointerdown',()=>{
        selectedIdx=mn-1;
        refreshCard();
        scrollToSelected(true);
      });
      evoDotContainer.addChild(dot);
      evoDotContainer.addChild(hitArea);
      dx+=dotGap;
    });
  }

  // Stat bars
  const stats=getStats(no);
  for(let i=0;i<4;i++){
    const sy=STAT_Y+i*12;
    statLabelTs[i].x=12;statLabelTs[i].y=sy;
    statBarG[i].clear();
    rect(statBarG[i],BAR_X,sy+2,BAR_W,6,P.black,2);
    const w=Math.max(3,(stats[i]/100)*BAR_W);
    rect(statBarG[i],BAR_X,sy+2,w,6,statColors[i],2);
    statValTs[i].text=String(stats[i]);
    statValTs[i].x=BAR_X+BAR_W+6;statValTs[i].y=sy;
  }

  // Strip counter
  stripCountTx.text=`${noStr}/151`;

  // Highlight selected cell in strip
  updateStripSelection();
}

function updateStripSelection(){
  selHighlight.clear();
  const cx=selectedIdx*(CELL_SIZE+CELL_PAD);
  bdr(selHighlight,cx-2,stripCellY-2,CELL_SIZE+4,CELL_SIZE+4,P.accent,2,5);
}

/* ============================================================
   STRIP SCROLL — touch drag with inertia
   ============================================================ */
const minScrollX=Math.min(0,-(TOTAL_W-GW+20));
let stripDragging=false, stripDragX0=0, stripScrollX0=0;
let stripVel=0, stripLastX=0, stripLastT=0, stripWasDrag=false;

// Hit area for strip touch
const stripHit=new PIXI.Graphics();
rect(stripHit,0,0,GW,STRIP_H-22,0xff0000);
stripHit.alpha=0;stripHit.eventMode='static';
stripScrollClip.addChild(stripHit);

stripHit.on('pointerdown',e=>{
  stripDragging=true;stripWasDrag=false;stripVel=0;
  stripDragX0=e.global.x/fit;stripScrollX0=stripContent.x;
  stripLastX=stripDragX0;stripLastT=performance.now();
});
stripHit.on('pointermove',e=>{
  if(!stripDragging)return;
  const x=e.global.x/fit;
  const dx=x-stripDragX0;
  if(Math.abs(dx)>4)stripWasDrag=true;
  stripContent.x=Math.max(minScrollX,Math.min(0,stripScrollX0+dx));
  const now=performance.now(),dt=now-stripLastT;
  if(dt>0)stripVel=(x-stripLastX)/dt*16;
  stripLastX=x;stripLastT=now;
});
const onStripUp=e=>{
  if(!stripDragging)return;
  stripDragging=false;
  if(!stripWasDrag){
    // Tap — find which cell
    const lx=(e.global.x/fit)-stripContent.x;
    const idx=Math.floor(lx/(CELL_SIZE+CELL_PAD));
    if(idx>=0&&idx<151){
      selectedIdx=idx;
      refreshCard();
      scrollToSelected(true);
    }
  }
};
stripHit.on('pointerup',onStripUp);
stripHit.on('pointerupoutside',onStripUp);

function scrollToSelected(animate){
  const targetX=-selectedIdx*(CELL_SIZE+CELL_PAD)+GW/2-CELL_SIZE/2;
  const clamped=Math.max(minScrollX,Math.min(0,targetX));
  if(animate){
    // Smooth scroll via velocity nudge
    stripVel=(clamped-stripContent.x)*0.15;
    scrollTargetX=clamped;
    scrollAnimating=true;
  }else{
    stripContent.x=clamped;
  }
}

let scrollTargetX=0, scrollAnimating=false;

// Inertia ticker
app.ticker.add(()=>{
  if(scrollAnimating){
    stripContent.x+=(scrollTargetX-stripContent.x)*0.18;
    if(Math.abs(stripContent.x-scrollTargetX)<0.5){
      stripContent.x=scrollTargetX;
      scrollAnimating=false;
    }
  }else if(!stripDragging&&Math.abs(stripVel)>0.2){
    stripContent.x=Math.max(minScrollX,Math.min(0,stripContent.x+stripVel));
    stripVel*=0.92;
  }
});

/* ============================================================
   TOP CARD SWIPE — left/right to change monster
   ============================================================ */
let cardDragging=false, cardDragX0=0, cardDragY0=0, cardWasDrag=false;
const cardHit=new PIXI.Graphics();
rect(cardHit,0,0,GW,CARD_H,0xff0000);
cardHit.alpha=0;cardHit.eventMode='static';
cardContainer.addChild(cardHit);

cardHit.on('pointerdown',e=>{
  cardDragging=true;cardWasDrag=false;
  cardDragX0=e.global.x/fit;
  cardDragY0=e.global.y/fit;
});
cardHit.on('pointermove',e=>{
  if(!cardDragging)return;
  const dx=e.global.x/fit-cardDragX0;
  if(Math.abs(dx)>20)cardWasDrag=true;
});
const onCardUp=e=>{
  if(!cardDragging)return;
  cardDragging=false;
  if(cardWasDrag){
    const dx=e.global.x/fit-cardDragX0;
    if(dx<-30&&selectedIdx<150){
      selectedIdx++;
      refreshCard();
      scrollToSelected(true);
    }else if(dx>30&&selectedIdx>0){
      selectedIdx--;
      refreshCard();
      scrollToSelected(true);
    }
  }
};
cardHit.on('pointerup',onCardUp);
cardHit.on('pointerupoutside',onCardUp);

/* ============================================================
   MONSTER FLOAT ANIMATION
   ============================================================ */
let tick=0;
app.ticker.add(()=>{
  tick+=0.04;
  if(monContainer.children.length>0){
    const baseY=Math.floor(CARD_H*0.22);
    monContainer.children[0].y=baseY+Math.sin(tick)*3;
  }
});

/* ============================================================
   INIT
   ============================================================ */
refreshCard();
scrollToSelected(false);

})();
</script>
</body>
</html>
