function rgb2hex(r,g,b){return(r<<16)|(g<<8)|b;}
function getBrandColor(brand,idx){
  const c=BRAND_COLORS[brand];
  if(!c)return[128,128,128];
  return c[Math.min(idx,c.length-1)];
}

function rect(g,x,y,w,h,c,r){g.fill(c);r?g.roundRect(x,y,w,h,r):g.rect(x,y,w,h);g.fill();}
function bdr(g,x,y,w,h,c,lw,r){g.stroke({color:c,width:lw||1});r?g.roundRect(x,y,w,h,r):g.rect(x,y,w,h);g.stroke();}
function tx(s,sz,c,fw){return new PIXI.Text({text:s,style:{fontFamily:'"Courier New",monospace',fontSize:sz,fill:c||P.white,fontWeight:fw||'normal'}});}

/* ============================================================
   PIXEL MONSTER GENERATOR (brand colored)
   ============================================================ */
function makeMonster(dexNo,size){
  const info=dexMap[dexNo]||{brand:'IBM'};
  const bc=getBrandColor(info.brand,0);
  const bc2=getBrandColor(info.brand,1);
  const bc3=getBrandColor(info.brand,2);
  const bodyC=rgb2hex(...bc);
  const darkC=rgb2hex(...bc2);
  const lightC=rgb2hex(...bc3);

  const c=new PIXI.Container();
  const g=new PIXI.Graphics();
  let seed=dexNo*2654435761;
  const rand=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};

  const PX=Math.max(1,Math.floor(size/12));
  const HALF=5,ROWS=10;
  const tw=HALF*2*PX, th=ROWS*PX;
  const ox=Math.floor((size-tw)/2), oy=Math.floor((size-th)/2);

  const pat=[];
  for(let r=0;r<ROWS;r++){
    pat[r]=[];
    for(let col=0;col<HALF;col++){
      let prob=col>=HALF-2?0.78:col<1?0.22:0.50;
      if(r<=1||r>=ROWS-2)prob*=0.45;
      pat[r][col]=rand()<prob?1:0;
    }
  }
  for(let r=2;r<ROWS-2;r++)
    for(let col=HALF-3;col<HALF;col++)pat[r][col]=1;

  for(let r=0;r<ROWS;r++){
    for(let col=0;col<HALF;col++){
      if(!pat[r][col])continue;
      const edge=!pat[r]?.[col-1]||r===0||r===ROWS-1||!pat[r-1]?.[col]||!pat[r+1]?.[col];
      const clr=edge?lightC:bodyC;
      rect(g,ox+(HALF-1-col)*PX,oy+r*PX,PX,PX,clr);
      rect(g,ox+(HALF+col)*PX,oy+r*PX,PX,PX,clr);
    }
  }
  // Shadow
  for(let col=0;col<HALF;col++){
    for(let r=ROWS-3;r<ROWS;r++){
      if(pat[r]?.[col]){
        rect(g,ox+(HALF-1-col)*PX,oy+r*PX,PX,PX,darkC);
        rect(g,ox+(HALF+col)*PX,oy+r*PX,PX,PX,darkC);
      }
    }
  }
  // Eyes
  const er=Math.floor(ROWS*0.3);
  const ec=1+Math.floor(rand()*2);
  rect(g,ox+(HALF-ec)*PX,oy+er*PX,PX,PX,0xffffff);
  rect(g,ox+(HALF+ec-1)*PX,oy+er*PX,PX,PX,0xffffff);

  c.addChild(g);
  return c;
}

  let s=no*2654435761;
  const r=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
  return[Math.floor(r()*65+35),Math.floor(r()*65+30),Math.floor(r()*65+30),Math.floor(r()*65+30)];
}

/* ============================================================

   ============================================================ */
function buildCard(dexIdx){
  const no=dexIdx+1;
  const info=dexMap[no]||{brand:'IBM',evoLine:'???',stage:1,maxStage:1,members:[String(no).padStart(3,'0')]};
  const bc=getBrandColor(info.brand,0);
  const brandHex=rgb2hex(...bc);
  const bc2=getBrandColor(info.brand,1);
  const bc3=getBrandColor(info.brand,2);

  const card=new PIXI.Container();

  // Full-screen background with brand tint
  const bgG=new PIXI.Graphics();
  const bgR=Math.floor(bc[0]*0.08+10);
  const bgGr=Math.floor(bc[1]*0.08+12);
  const bgB=Math.floor(bc[2]*0.08+18);
  rect(bgG,0,0,GW,GH,rgb2hex(bgR,bgGr,bgB));
  card.addChild(bgG);

  // Subtle radial glow behind monster (brand color circle)
  const glowG=new PIXI.Graphics();
  glowG.fill({color:brandHex,alpha:0.06});
  glowG.circle(GW/2,200,120);
  glowG.fill();
  glowG.fill({color:brandHex,alpha:0.03});
  glowG.circle(GW/2,200,180);
  glowG.fill();
  card.addChild(glowG);

  // ── TOP BAR ──
  const HDR=42;
  const hdrBg=new PIXI.Graphics();
  rect(hdrBg,0,0,GW,HDR,P.panel);
  rect(hdrBg,0,HDR-1,GW,1,P.border);
  // Brand accent stripe at very top
  rect(hdrBg,0,0,GW,3,brandHex);
  card.addChild(hdrBg);

  const noStr=String(no).padStart(3,'0');
  const noTx=tx(`No.${noStr}`,12,P.gray,'bold');
  noTx.x=12;noTx.y=13;
  card.addChild(noTx);

  const brandLabel=tx('MODELMON',10,P.accent);
  brandLabel.x=GW-brandLabel.width-12;
  brandLabel.y=15;
  card.addChild(brandLabel);

  // ── MONSTER (large, centered) ──
  const MON_SIZE=160;
  const MON_Y=HDR+20;
  const mon=makeMonster(no,MON_SIZE);
  mon.x=(GW-MON_SIZE)/2;
  mon.y=MON_Y;
  mon._baseY=MON_Y;
  card.addChild(mon);
  card._monster=mon;

  // Scanlines over monster area
  const scanG=new PIXI.Graphics();
  scanG.alpha=0.04;
  for(let sy=MON_Y;sy<MON_Y+MON_SIZE;sy+=2){
    rect(scanG,0,sy,GW,1,0x000000);
  }
  card.addChild(scanG);

  // ── NAME SECTION ──
  const NAME_Y=MON_Y+MON_SIZE+12;
  const nameKo=tx(POKE_NAMES[no-1]||`MOD${noStr}`,22,P.white,'bold');
  nameKo.x=Math.floor((GW-nameKo.width)/2);
  nameKo.y=NAME_Y;
  card.addChild(nameKo);

  // ── BRAND BADGE ──
  const BADGE_Y=NAME_Y+32;
  const brandName=info.brand;
  const badgeW=Math.min(brandName.length*7.5+20,GW-40);
  const badgeBg=new PIXI.Graphics();
  rect(badgeBg,Math.floor((GW-badgeW)/2),BADGE_Y,badgeW,22,brandHex,4);
  badgeBg.alpha=0.85;
  card.addChild(badgeBg);
  const brandTx=tx(brandName,10,P.white);
  brandTx.x=Math.floor((GW-brandTx.width)/2);
  brandTx.y=BADGE_Y+5;
  card.addChild(brandTx);

  // ── ORIGINAL POKE LINE NAME ──
  const POKE_Y=BADGE_Y+28;
  const evo=evoLines.find(e=>no>=e.start&&no<=e.end);
  const pokeLineTx=tx(evo?evo.name:'???',9,P.grayDk);
  pokeLineTx.x=Math.floor((GW-pokeLineTx.width)/2);
  pokeLineTx.y=POKE_Y;
  card.addChild(pokeLineTx);

  // ── EVO STAGE DOTS ──
  const DOT_Y=POKE_Y+18;
  const dotG=new PIXI.Graphics();
  const totalDots=info.maxStage;
  const dotR=4;
  const dotGap=14;
  const dotsW=totalDots*dotR*2+(totalDots-1)*(dotGap-dotR*2);
  let dx=(GW-dotsW)/2;
  for(let i=0;i<totalDots;i++){
    const isCurrent=(i+1)===info.stage;
    dotG.fill(isCurrent?brandHex:P.grayDk);
    dotG.circle(dx+dotR,DOT_Y+dotR,dotR);
    dotG.fill();
    if(isCurrent){
      dotG.stroke({color:brandHex,width:1.5});
      dotG.circle(dx+dotR,DOT_Y+dotR,dotR+2);
      dotG.stroke();
    }
    // Connector line
    if(i<totalDots-1){
      dotG.stroke({color:P.grayDk,width:1});
      dotG.moveTo(dx+dotR*2+1,DOT_Y+dotR);
      dotG.lineTo(dx+dotGap-1,DOT_Y+dotR);
      dotG.stroke();
    }
    dx+=dotGap;
  }
  card.addChild(dotG);

  // ── STAT BARS ──
  const statLabels=['HP','ATK','DEF','SPD'];
  const statColors=[P.green,P.red,P.blue,P.yellow];
  const stats=getStats(no);
  const STAT_Y=DOT_Y+26;
  const BAR_X=60;
  const BAR_W=GW-BAR_X-50;

  // Stats panel bg
  const statPanelBg=new PIXI.Graphics();
  rect(statPanelBg,12,STAT_Y-8,GW-24,100,P.panel,6);
  bdr(statPanelBg,12,STAT_Y-8,GW-24,100,P.border,1,6);
  card.addChild(statPanelBg);

  for(let i=0;i<4;i++){
    const sy=STAT_Y+i*22+4;
    const labelT=tx(statLabels[i],9,P.gray);
    labelT.x=24;labelT.y=sy;
    card.addChild(labelT);

    const barG=new PIXI.Graphics();
    rect(barG,BAR_X,sy+3,BAR_W,8,P.black,3);
    const w=Math.max(4,(stats[i]/100)*BAR_W);
    rect(barG,BAR_X,sy+3,w,8,statColors[i],3);
    card.addChild(barG);

    const valT=tx(String(stats[i]),9,statColors[i]);
    valT.x=BAR_X+BAR_W+8;valT.y=sy;
    card.addChild(valT);
  }

  // ── EVO LINE MINI MONSTERS (bottom row, tappable) ──
  const EVO_LABEL_Y=STAT_Y+102;
  const evoLabelTx=tx('EVOLUTION',8,P.gray);
  evoLabelTx.x=Math.floor((GW-evoLabelTx.width)/2);
  evoLabelTx.y=EVO_LABEL_Y;
  card.addChild(evoLabelTx);

  const EVO_Y=EVO_LABEL_Y+16;
  const evoSize=40;
  const evoGap=10;
  const members=info.members||[];
  const totalEvoW=members.length*(evoSize+evoGap)-evoGap;
  let ex=Math.floor((GW-totalEvoW)/2);
  card._evoCells=[];

  for(let mi=0;mi<members.length;mi++){
    const mn=parseInt(members[mi],10);
    const eCell=new PIXI.Container();
    eCell.x=ex;eCell.y=EVO_Y;
    eCell.eventMode='static';eCell.cursor='pointer';

    const isCurrent=mn===no;
    const ebg=new PIXI.Graphics();
    rect(ebg,0,0,evoSize,evoSize,isCurrent?P.panelLt:P.black,4);
    bdr(ebg,0,0,evoSize,evoSize,isCurrent?P.accent:P.border,isCurrent?2:1,4);
    eCell.addChild(ebg);

    const eMon=makeMonster(mn,evoSize-8);
    eMon.x=4;eMon.y=2;
    eCell.addChild(eMon);

    // Dex number under mini mon
    const eMiniNo=tx(String(mn).padStart(3,'0'),6,isCurrent?P.white:P.grayDk);
    eMiniNo.x=Math.floor((evoSize-eMiniNo.width)/2);
    eMiniNo.y=evoSize+2;
    eCell.addChild(eMiniNo);

    // Arrow between evos
    if(mi<members.length-1){
      const arrow=tx('>',11,P.grayDk);
      arrow.x=evoSize+1;arrow.y=12;
      eCell.addChild(arrow);
    }

    // Tap to jump
    const capturedMn=mn;
    eCell.on('pointerdown',()=>{
      currentIdx=capturedMn-1;
      rebuildCards();
    });
    card.addChild(eCell);
    card._evoCells.push(eCell);
    ex+=evoSize+evoGap;
  }

  // ── BOTTOM COUNTER ──
  const counterTx=tx(`${no} / 151`,9,P.grayDk);
  counterTx.x=Math.floor((GW-counterTx.width)/2);
  counterTx.y=GH-20;
  card.addChild(counterTx);

  return card;
}

/* ============================================================
   CARD CONTAINER — holds up to 3 cards (prev, current, next)
   ============================================================ */
const cardLayer=new PIXI.Container();
root.addChild(cardLayer);

let cardPrev=null, cardCurr=null, cardNext=null;

function rebuildCards(){
  cardLayer.removeChildren();

  // Build current card
  cardCurr=buildCard(currentIdx);
  cardCurr.x=0;
  cardLayer.addChild(cardCurr);

  // Build prev card (if exists)
  if(currentIdx>0){
    cardPrev=buildCard(currentIdx-1);
    cardPrev.x=-GW;
    cardLayer.addChild(cardPrev);
  }else{
    cardPrev=null;
  }

  // Build next card (if exists)
  if(currentIdx<150){
    cardNext=buildCard(currentIdx+1);
    cardNext.x=GW;
    cardLayer.addChild(cardNext);
  }else{
    cardNext=null;
  }
}

rebuildCards();

/* ============================================================
   SWIPE MECHANICS — using stage-level events
   ============================================================ */
let isDragging=false;
let dragStartX=0;
let dragStartY=0;
let dragOffsetX=0;
let animating=false;
let animTarget=0; // 0=snap back, -GW=go next, +GW=go prev
let wasDrag=false;
let tapX=0, tapY=0; // store tap position for forwarding

const SWIPE_THRESHOLD=GW*0.25;

// Use app.stage directly for swipe detection
app.stage.eventMode='static';
app.stage.hitArea=new PIXI.Rectangle(0,0,GW,GH);

app.stage.on('pointerdown',(e)=>{
  if(animating)return;
  isDragging=true;
  wasDrag=false;
  dragStartX=e.global.x;
  dragStartY=e.global.y;
  tapX=e.global.x;
  tapY=e.global.y;
  dragOffsetX=0;
});

app.stage.on('pointermove',(e)=>{
  if(!isDragging)return;
  const x=e.global.x;
  dragOffsetX=x-dragStartX;

  if(Math.abs(dragOffsetX)>6)wasDrag=true;

  // Clamp at edges — rubber band feel
  if(currentIdx===0&&dragOffsetX>0){
    dragOffsetX=dragOffsetX*0.3;
  }
  if(currentIdx>=150&&dragOffsetX<0){
    dragOffsetX=dragOffsetX*0.3;
  }

  // Move all cards
  if(cardCurr)cardCurr.x=dragOffsetX;
  if(cardPrev)cardPrev.x=-GW+dragOffsetX;
  if(cardNext)cardNext.x=GW+dragOffsetX;
});

function onPointerUp(e){
  if(!isDragging)return;
  isDragging=false;

  if(!wasDrag){
    // It was a tap — check if it hit an evo cell on current card
    cardCurr.x=0;
    if(cardPrev)cardPrev.x=-GW;
    if(cardNext)cardNext.x=GW;
    // Forward tap to interactive children
    if(cardCurr&&cardCurr._evoCells){
      const lx=tapX, ly=tapY;
      for(const cell of cardCurr._evoCells){
        const bounds=cell.getBounds();
        // Convert bounds to virtual coords
        const bx=bounds.x, by=bounds.y, bw=bounds.width, bh=bounds.height;
        if(lx>=bx&&lx<=bx+bw&&ly>=by&&ly<=by+bh){
          cell.emit('pointerdown');
          return;
        }
      }
    }
    return;
  }

  // Determine swipe direction
  if(dragOffsetX<-SWIPE_THRESHOLD&&currentIdx<150){
    animTarget=-GW;
    animating=true;
  }else if(dragOffsetX>SWIPE_THRESHOLD&&currentIdx>0){
    animTarget=GW;
    animating=true;
  }else{
    animTarget=0;
    animating=true;
  }
}

app.stage.on('pointerup',onPointerUp);
app.stage.on('pointerupoutside',onPointerUp);

/* ============================================================
   ANIMATION TICKER
   ============================================================ */
let tick=0;
const ANIM_LERP=0.15;

app.ticker.add(()=>{
  tick+=0.04;

  // Float animation for current card's monster
  if(cardCurr&&cardCurr._monster){
    cardCurr._monster.y=cardCurr._monster._baseY+Math.sin(tick)*4;
  }
  if(cardPrev&&cardPrev._monster){
    cardPrev._monster.y=cardPrev._monster._baseY+Math.sin(tick)*4;
  }
  if(cardNext&&cardNext._monster){
    cardNext._monster.y=cardNext._monster._baseY+Math.sin(tick)*4;
  }

  // Swipe animation
  if(!animating)return;

  const currentX=cardCurr.x;
  const diff=animTarget-currentX;

  if(Math.abs(diff)<1){
    // Snap to final position
    cardCurr.x=animTarget;
    if(cardPrev)cardPrev.x=-GW+animTarget;
    if(cardNext)cardNext.x=GW+animTarget;
    animating=false;

    // If we actually moved to a new card, update state
    if(animTarget===-GW){
      currentIdx++;
      rebuildCards();
    }else if(animTarget===GW){
      currentIdx--;
      rebuildCards();
    }else{
      // Snapped back, ensure positions
      cardCurr.x=0;
      if(cardPrev)cardPrev.x=-GW;
      if(cardNext)cardNext.x=GW;
    }
  }else{
    // Lerp towards target
    const move=diff*ANIM_LERP;
    cardCurr.x+=move;
    if(cardPrev)cardPrev.x=-GW+cardCurr.x;
    if(cardNext)cardNext.x=GW+cardCurr.x;
  }
});

/* ============================================================
   KEYBOARD NAV (for desktop testing)
   ============================================================ */
window.addEventListener('keydown',(e)=>{
  if(animating)return;
  if(e.key==='ArrowLeft'&&currentIdx>0){
    animTarget=GW;
    animating=true;
  }else if(e.key==='ArrowRight'&&currentIdx<150){
    animTarget=-GW;
    animating=true;
  }
});

})();
</script>
