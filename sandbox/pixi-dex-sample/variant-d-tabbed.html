  });
});

function rect(g,x,y,w,h,c,r){g.fill(c);r?g.roundRect(x,y,w,h,r):g.rect(x,y,w,h);g.fill();}
function bdr(g,x,y,w,h,c,lw,r){g.stroke({color:c,width:lw||1});r?g.roundRect(x,y,w,h,r):g.rect(x,y,w,h);g.stroke();}
function tx(s,sz,c,ww){return new PIXI.Text({text:s,style:{fontFamily:'"Courier New",monospace',fontSize:sz,fill:c||P.white,wordWrap:!!ww,wordWrapWidth:ww||0}});}

/* ============================================================
   PIXEL MONSTER GENERATOR (brand colored)
   ============================================================ */
function makeMonster(dexNo,size){
  const info=dexMap[dexNo]||{brand:'IBM'};
  const bc=getBrandColor(info.brand,0);
  const bc2=getBrandColor(info.brand,1);
  const bc3=getBrandColor(info.brand,2);
  const bodyC=rgb2hex(...bc);
  const darkC=rgb2hex(...bc2);
  const lightC=rgb2hex(...bc3);

  const c=new PIXI.Container();
  const g=new PIXI.Graphics();
  let seed=dexNo*2654435761;
  const rand=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};

  const PX=Math.max(1,Math.floor(size/12));
  const HALF=5,ROWS=10;
  const tw=HALF*2*PX, th=ROWS*PX;
  const ox=Math.floor((size-tw)/2), oy=Math.floor((size-th)/2);

  const pat=[];
  for(let r=0;r<ROWS;r++){
    pat[r]=[];
    for(let col=0;col<HALF;col++){
      let prob=col>=HALF-2?0.78:col<1?0.22:0.50;
      if(r<=1||r>=ROWS-2)prob*=0.45;
      pat[r][col]=rand()<prob?1:0;
    }
  }
  for(let r=2;r<ROWS-2;r++)
    for(let col=HALF-3;col<HALF;col++)pat[r][col]=1;

  for(let r=0;r<ROWS;r++){
    for(let col=0;col<HALF;col++){
      if(!pat[r][col])continue;
      const edge=!pat[r]?.[col-1]||r===0||r===ROWS-1||!pat[r-1]?.[col]||!pat[r+1]?.[col];
      const clr=edge?lightC:bodyC;
      rect(g,ox+(HALF-1-col)*PX,oy+r*PX,PX,PX,clr);
      rect(g,ox+(HALF+col)*PX,oy+r*PX,PX,PX,clr);
    }
  }
  // Shadow
  for(let col=0;col<HALF;col++){
    for(let r=ROWS-3;r<ROWS;r++){
      if(pat[r]?.[col]){
        rect(g,ox+(HALF-1-col)*PX,oy+r*PX,PX,PX,darkC);
        rect(g,ox+(HALF+col)*PX,oy+r*PX,PX,PX,darkC);
      }
    }
  }
  // Eyes
  const er=Math.floor(ROWS*0.3);
  const ec=1+Math.floor(rand()*2);
  rect(g,ox+(HALF-ec)*PX,oy+er*PX,PX,PX,0xffffff);
  rect(g,ox+(HALF+ec-1)*PX,oy+er*PX,PX,PX,0xffffff);

  c.addChild(g);
  return c;
}

  showMon.removeChildren();
  const mon=makeMonster(no,80);
  mon.x=16;mon.y=TOP_Y+14;
  showMon.addChild(mon);

  // Texts
  const noStr=String(no).padStart(3,'0');
  dNoTx.text=`No.${noStr}`;dNoTx.x=102;dNoTx.y=TOP_Y+12;
  dNameKo.text=data.name_ko;dNameKo.x=102;dNameKo.y=TOP_Y+26;
  dNameEn.text=data.name_en;dNameEn.x=102;dNameEn.y=TOP_Y+46;

  // Brand badge
  dBrandBg.clear();
  const bw=Math.min(data.name_en.length*6+info.brand.length*6+20,GW-120);
  rect(dBrandBg,102,TOP_Y+62,Math.min(info.brand.length*7+14,GW-120),18,brandHex,3);
  dBrandBg.alpha=0.85;
  dBrandTx.text=info.brand;dBrandTx.x=108;dBrandTx.y=TOP_Y+64;

  // Content bg
  contentBg.clear();
  rect(contentBg,8,CONTENT_Y,GW-16,CONTENT_H,P.panel,6);
  bdr(contentBg,8,CONTENT_Y,GW-16,CONTENT_H,P.border,1,6);

  // Scanlines
  scanG.clear();
  for(let sy=CONTENT_Y;sy<CONTENT_Y+CONTENT_H;sy+=2)rect(scanG,8,sy,GW-16,1,0x000000);

  // Tabs
  refreshTabs();
  refreshTabContent();

  // Nav
  prevBtn.alpha=selectedIdx>0?1:0.3;
  nextBtn.alpha=selectedIdx<150?1:0.3;
}

/* ============================================================
   TAB CONTENT RENDERING
   ============================================================ */
function refreshTabContent(){
  const no=selectedIdx+1;
  const info=dexMap[no]||{brand:'IBM',evoLine:'???',stage:1,maxStage:1};
  const data=detailMap[no];

  // Hide all, show active
  tabContents.forEach((tc,i)=>{tc.visible=i===activeTab;tc.removeChildren();});

  const cx=20, cy=CONTENT_Y+12;
  const cw=GW-56;

  if(activeTab===0) renderTab0(tabContents[0],data,info,cx,cy,cw,no);
  else if(activeTab===1) renderTab1(tabContents[1],data,cx,cy,cw);
  else renderTab2(tabContents[2],data,info,cx,cy,cw,no);
}

/* ── TAB 0: 기본 (Basic) ── */
function renderTab0(cont,data,info,cx,cy,cw,no){
  let y=cy;
  const labelC=P.gray;
  const valC=P.white;
  const rowH=18;

  // Helper for label: value rows
  function addRow(label,value){
    const lt=tx(label,9,labelC);lt.x=cx;lt.y=y;cont.addChild(lt);
    const vt=tx(value,9,valC);vt.x=cx+90;vt.y=y;cont.addChild(vt);
    y+=rowH;
  }

  addRow('단계',data.stage+'단계');
  addRow('모델 파라미터',data.params);
  addRow('파일 크기',data.size_kb+' KB');
  addRow('입력 방식',data.input);
  addRow('출력 방식',data.output);

  y+=6;

  // Stat bars
  let s=no*2654435761;
  const r=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
  const stats=[Math.floor(r()*65+35),Math.floor(r()*65+30),Math.floor(r()*65+30),Math.floor(r()*65+30)];
  const statLabels=['HP','ATK','DEF','SPD'];
  const statColors=[P.green,P.red,P.blue,P.yellow];
  const BAR_X=cx+40;
  const BAR_W=cw-60;

  statLabels.forEach((lab,i)=>{
    const lt=tx(lab,8,P.gray);lt.x=cx;lt.y=y+2;cont.addChild(lt);
    const bg=new PIXI.Graphics();
    rect(bg,BAR_X,y+3,BAR_W,7,P.black,2);
    const w=Math.max(3,(stats[i]/100)*BAR_W);
    rect(bg,BAR_X,y+3,w,7,statColors[i],2);
    cont.addChild(bg);
    const vt=tx(String(stats[i]),8,statColors[i]);vt.x=BAR_X+BAR_W+4;vt.y=y+1;cont.addChild(vt);
    y+=16;
  });

  y+=8;

  // Evo line
  const evoLbl=tx('진화 라인',9,P.gray);evoLbl.x=cx;evoLbl.y=y;cont.addChild(evoLbl);
  y+=16;

  const evo=evoLines.find(e=>no>=e.start&&no<=e.end);
  if(evo){
    const evoSize=36;
    const evoGap=8;
    const totalEvoW=evo.members.length*(evoSize+evoGap)-evoGap;
    let ex=Math.floor((GW-totalEvoW)/2);
    evo.members.forEach((m,mi)=>{
      const mn=parseInt(m,10);
      const eCell=new PIXI.Container();
      eCell.x=ex;eCell.y=y;
      eCell.eventMode='static';eCell.cursor='pointer';

      const ebg=new PIXI.Graphics();
      const isCurrent=mn===no;
      rect(ebg,0,0,evoSize,evoSize,isCurrent?P.panelLt:P.black,3);
      bdr(ebg,0,0,evoSize,evoSize,isCurrent?P.accent:P.border,isCurrent?2:1,3);
      eCell.addChild(ebg);

      const eMon=makeMonster(mn,evoSize-6);
      eMon.x=3;eMon.y=1;
      eCell.addChild(eMon);

      if(mi<evo.members.length-1){
        const arrow=tx('>',10,P.grayDk);
        arrow.x=evoSize+1;arrow.y=12;
        eCell.addChild(arrow);
      }

      eCell.on('pointerdown',()=>{selectedIdx=mn-1;activeTab=0;refreshDetail();});
      cont.addChild(eCell);
      ex+=evoSize+evoGap;
    });
  }
}

/* ── TAB 1: AI 개념 (Concept) ── */
function renderTab1(cont,data,cx,cy,cw){
  let y=cy;

  // 핵심 개념
  const coreLbl=tx('핵심 개념',9,P.gray);coreLbl.x=cx;coreLbl.y=y;cont.addChild(coreLbl);
  y+=16;
  const coreColor=CONCEPT_COLORS[data.core]||P.gray;
  const coreBadge=new PIXI.Graphics();
  const coreBW=data.core.length*10+16;
  rect(coreBadge,cx,y,coreBW,22,coreColor,4);
  cont.addChild(coreBadge);
  const coreTx=tx(data.core,11,P.white);coreTx.x=cx+8;coreTx.y=y+4;cont.addChild(coreTx);
  y+=32;

  // 보조 개념
  const subLbl=tx('보조 개념',9,P.gray);subLbl.x=cx;subLbl.y=y;cont.addChild(subLbl);
  y+=16;
  const subColor=CONCEPT_COLORS[data.sub]||P.gray;
  const subBadge=new PIXI.Graphics();
  const subBW=data.sub.length*10+16;
  rect(subBadge,cx,y,subBW,22,subColor,4);
  cont.addChild(subBadge);
  const subTx=tx(data.sub,11,P.white);subTx.x=cx+8;subTx.y=y+4;cont.addChild(subTx);
  y+=34;

  // 모티프
  const motifLbl=tx('모티프',9,P.gray);motifLbl.x=cx;motifLbl.y=y;cont.addChild(motifLbl);
  y+=16;
  const motifTx=tx(data.motif,9,P.white,cw);
  motifTx.x=cx;motifTx.y=y;
  cont.addChild(motifTx);
  y+=Math.ceil(motifTx.height)+12;

  // 성향
  const temperLbl=tx('성향',9,P.gray);temperLbl.x=cx;temperLbl.y=y;cont.addChild(temperLbl);
  y+=16;
  const temperTx=tx(data.temper,10,P.yellow);temperTx.x=cx;temperTx.y=y;cont.addChild(temperTx);
}

/* ── TAB 2: 설명 (Description) ── */
function renderTab2(cont,data,info,cx,cy,cw,no){
  let y=cy;

  // Flavor text
  const flavorTx=tx(data.flavor,9,P.white,cw);
  flavorTx.x=cx;flavorTx.y=y;
  cont.addChild(flavorTx);
  y+=Math.ceil(flavorTx.height)+16;

  // Divider
  const divG=new PIXI.Graphics();
  rect(divG,cx,y,cw,1,P.border);
  cont.addChild(divG);
  y+=10;

  // Original Pokemon line
  const evo=evoLines.find(e=>no>=e.start&&no<=e.end);
  const origLbl=tx('원작 라인',9,P.gray);origLbl.x=cx;origLbl.y=y;cont.addChild(origLbl);
  y+=16;
  const origTx=tx(evo?evo.name:'???',10,P.white);origTx.x=cx;origTx.y=y;cont.addChild(origTx);
  y+=20;

  // Brand
  const brandLbl=tx('브랜드',9,P.gray);brandLbl.x=cx;brandLbl.y=y;cont.addChild(brandLbl);
  y+=16;
  const bc=getBrandColor(info.brand,0);
  const brandHex=rgb2hex(...bc);
  const brandBg=new PIXI.Graphics();
  const bbw=info.brand.length*7+16;
  rect(brandBg,cx,y,bbw,20,brandHex,3);
  brandBg.alpha=0.85;
  cont.addChild(brandBg);
  const brandTx=tx(info.brand,9,P.white);brandTx.x=cx+8;brandTx.y=y+3;cont.addChild(brandTx);
  y+=28;

  // Pokemon name
  const pokeLbl=tx('원작 포켓몬',9,P.gray);pokeLbl.x=cx;pokeLbl.y=y;cont.addChild(pokeLbl);
  y+=16;
  const pokeName=POKE_NAMES[no-1]||'???';
  const pokeTx=tx(pokeName,10,P.white);pokeTx.x=cx;pokeTx.y=y;cont.addChild(pokeTx);
}

/* ============================================================
   SHOW/HIDE
   ============================================================ */
function showDetail(){
  viewMode='detail';
  activeTab=0;
  gridView.visible=false;
  detailView.visible=true;
  refreshDetail();
}

// Detail monster float animation
let tick=0;
app.ticker.add(()=>{
  tick+=0.04;
  if(detailView.visible&&showMon.children.length>0){
    showMon.children[0].y=TOP_Y+14+Math.sin(tick)*2;
  }
});

})();
</script>
