function bdr(g,x,y,w,h,c,lw,r){g.stroke({color:c,width:lw||1});r?g.roundRect(x,y,w,h,r):g.rect(x,y,w,h);g.stroke();}

/* ============================================================
   PIXEL MONSTER GENERATOR (brand colored)
   ============================================================ */
function makeMonster(dexNo,size){
  const info=dexMap[dexNo]||{brand:'IBM'};
  const bc=getBrandColor(info.brand,0);
  const bc2=getBrandColor(info.brand,1);
  const bc3=getBrandColor(info.brand,2);
  const bodyC=rgb2hex(...bc);
  const darkC=rgb2hex(...bc2);
  const lightC=rgb2hex(...bc3);

  const c=new PIXI.Container();
  const g=new PIXI.Graphics();
  let seed=dexNo*2654435761;
  const rand=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};

  const PX=Math.max(1,Math.floor(size/12));
  const HALF=5,ROWS=10;
  const tw=HALF*2*PX, th=ROWS*PX;
  const ox=Math.floor((size-tw)/2), oy=Math.floor((size-th)/2);

  const pat=[];
  for(let r=0;r<ROWS;r++){
    pat[r]=[];
    for(let col=0;col<HALF;col++){
      let prob=col>=HALF-2?0.78:col<1?0.22:0.50;
      if(r<=1||r>=ROWS-2)prob*=0.45;
      pat[r][col]=rand()<prob?1:0;
    }
  }
  for(let r=2;r<ROWS-2;r++)
    for(let col=HALF-3;col<HALF;col++)pat[r][col]=1;

  for(let r=0;r<ROWS;r++){
    for(let col=0;col<HALF;col++){
      if(!pat[r][col])continue;
      const edge=!pat[r]?.[col-1]||r===0||r===ROWS-1||!pat[r-1]?.[col]||!pat[r+1]?.[col];
      const clr=edge?lightC:bodyC;
      rect(g,ox+(HALF-1-col)*PX,oy+r*PX,PX,PX,clr);
      rect(g,ox+(HALF+col)*PX,oy+r*PX,PX,PX,clr);
    }
  }
  // Shadow
  for(let col=0;col<HALF;col++){
    for(let r=ROWS-3;r<ROWS;r++){
      if(pat[r]?.[col]){
        rect(g,ox+(HALF-1-col)*PX,oy+r*PX,PX,PX,darkC);
        rect(g,ox+(HALF+col)*PX,oy+r*PX,PX,PX,darkC);
      }
    }
  }
  // Eyes
  const er=Math.floor(ROWS*0.3);
  const ec=1+Math.floor(rand()*2);
  rect(g,ox+(HALF-ec)*PX,oy+er*PX,PX,PX,0xffffff);
  rect(g,ox+(HALF+ec-1)*PX,oy+er*PX,PX,PX,0xffffff);

  c.addChild(g);
  return c;
}

const detailedMap={};

// Concept keys for placeholder generation
const CONCEPT_KEYS=Object.keys(CONCEPT_COLORS);

function getDetailedInfo(no){
  if(detailedMap[no])return detailedMap[no];
  // Generate placeholder
  const info=dexMap[no]||{brand:'IBM',stage:1,maxStage:1,members:[]};
  let s=no*2654435761;
  const r=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
  const core=CONCEPT_KEYS[Math.floor(r()*CONCEPT_KEYS.length)];
  const sub=CONCEPT_KEYS[Math.floor(r()*CONCEPT_KEYS.length)];
  const inputs=['텍스트','텍스트+이미지','이미지','음성'][Math.floor(r()*4)];
  const outputs=['텍스트','코드','이미지','복합출력'][Math.floor(r()*4)];
  const paramSizes=['3B','7B','8B','13B','16B','32B','34B','70B','72B','120B'];
  const params=paramSizes[Math.floor(r()*paramSizes.length)];
  const sizeKb=Math.floor(r()*200+30);
  const tempers=['호기심이 많음','차분하고 신중함','활발하고 적극적','과묵하지만 강인함','느긋하지만 정확함'];
  const temper=tempers[Math.floor(r()*tempers.length)];
  const pokeName=POKE_NAMES[no-1]||'???';
  return{
    no, id:info.brand.toLowerCase().replace(/\s/g,'_'),
    name_ko:pokeName, name_en:info.brand,
    stage:info.stage, core, sub, input:inputs, output:outputs,
    params, size_kb:sizeKb,
    motif:info.brand+' 계열의 '+info.stage+'단계 모델몬. '+pokeName+'의 특성을 품고 있다.',
    temper,
    flavor:pokeName+'은(는) '+info.brand+' 브랜드에서 태어난 모델몬이다. '+core+'을(를) 핵심 개념으로 삼고 '+sub+' 능력을 보조로 갖추었다. 조용히 힘을 기르며 자신만의 방식으로 세계와 소통한다.'
  };
}

/* ============================================================
   BUILD PROFILE — rebuilds scroll content for current monster
   ============================================================ */
function buildProfile(){
  scrollContent.removeChildren();
  scrollContent.y=0;

  const no=selectedIdx+1;
  const info=dexMap[no]||{brand:'IBM',evoLine:'???',stage:1,maxStage:1,members:['001']};
  const detail=getDetailedInfo(no);
  const bc=getBrandColor(info.brand,0);
  const bc2=getBrandColor(info.brand,1);
  const bc3=getBrandColor(info.brand,2);
  const brandHex=rgb2hex(...bc);
  const brandDark=rgb2hex(Math.floor(bc[0]*0.2+10),Math.floor(bc[1]*0.2+12),Math.floor(bc[2]*0.2+18));
  const brandMid=rgb2hex(Math.floor(bc[0]*0.35+15),Math.floor(bc[1]*0.35+18),Math.floor(bc[2]*0.35+22));

  let cy=8; // current Y cursor

  // Update header
  const noStr=String(no).padStart(3,'0');
  hdrTitle.text=`No.${noStr} ${detail.name_ko}`;
  hdrTitle.x=Math.floor((GW-hdrTitle.width)/2);
  hdrTitle.y=13;
  prevBtn.alpha=selectedIdx>0?1:0.3;
  nextBtn.alpha=selectedIdx<150?1:0.3;

  // Update footer
  ftrTx.text=`${no} / 151`;
  ftrTx.x=Math.floor((GW-ftrTx.width)/2);

  // ── 1. Monster Display Area ──
  const monAreaH=160;
  const monBg=new PIXI.Graphics();
  rect(monBg,0,cy,GW,monAreaH,brandDark,0);
  // Accent stripe top
  rect(monBg,0,cy,GW,3,brandHex);
  // Scanlines
  for(let sy=cy;sy<cy+monAreaH;sy+=3){
    rect(monBg,0,sy,GW,1,0x000000);monBg.alpha=1;
  }
  scrollContent.addChild(monBg);

  // Scanline overlay
  const scanG=new PIXI.Graphics();
  scanG.alpha=0.06;
  for(let sy=cy;sy<cy+monAreaH;sy+=2) rect(scanG,0,sy,GW,1,0x000000);
  scrollContent.addChild(scanG);

  const monSprite=makeMonster(no,120);
  monSprite.x=Math.floor((GW-120)/2);
  monSprite.y=cy+20;
  monSprite._baseY=cy+20;
  scrollContent.addChild(monSprite);

  cy+=monAreaH+4;

  // ── 2. Name Section ──
  const nameBg=new PIXI.Graphics();
  rect(nameBg,0,cy,GW,70,P.panel);
  rect(nameBg,0,cy+69,GW,1,P.border);
  scrollContent.addChild(nameBg);

  const nameKo=tx(detail.name_ko,18,P.white);
  nameKo.x=16;nameKo.y=cy+8;
  scrollContent.addChild(nameKo);

  const nameEn=tx(detail.name_en,11,P.gray);
  nameEn.x=16;nameEn.y=cy+30;
  scrollContent.addChild(nameEn);

  // Brand badge
  const brandBadge=new PIXI.Graphics();
  const bw=Math.min(info.brand.length*7+16,GW-40);
  rect(brandBadge,16,cy+48,bw,18,brandHex,3);
  scrollContent.addChild(brandBadge);
  const brandTx=tx(info.brand,9,0xffffff);
  brandTx.x=24;brandTx.y=cy+51;
  scrollContent.addChild(brandTx);

  cy+=74;

  // ── 3. Stage Indicator + Evo Line ──
  const stageBg=new PIXI.Graphics();
  rect(stageBg,0,cy,GW,58,P.panelLt);
  rect(stageBg,0,cy+57,GW,1,P.border);
  scrollContent.addChild(stageBg);

  // Stage pill
  const stagePill=new PIXI.Graphics();
  const stageText=`${info.stage}단계`;
  const pillW=stageText.length*8+16;
  rect(stagePill,16,cy+6,pillW,20,P.accent,10);
  scrollContent.addChild(stagePill);
  const stageTx=tx(stageText,10,0xffffff);
  stageTx.x=24;stageTx.y=cy+9;
  scrollContent.addChild(stageTx);

  // Max stage label
  const maxStageTx=tx(`/ ${info.maxStage}단계`,9,P.gray);
  maxStageTx.x=24+pillW+4;maxStageTx.y=cy+10;
  scrollContent.addChild(maxStageTx);

  // Evo line mini monsters
  const members=info.members||[];
  const evoSize=30;
  const evoGap=6;
  const totalEvoW=members.length*(evoSize+evoGap)-evoGap;
  let ex=Math.floor((GW-totalEvoW)/2);
  const evoY=cy+30;
  members.forEach((m,mi)=>{
    const mn=parseInt(m,10);
    const isCurrent=mn===no;

    const eCellBg=new PIXI.Graphics();
    rect(eCellBg,ex,evoY,evoSize,evoSize,isCurrent?brandMid:P.black,3);
    bdr(eCellBg,ex,evoY,evoSize,evoSize,isCurrent?P.accent:P.border,isCurrent?2:1,3);
    scrollContent.addChild(eCellBg);

    const eMon=makeMonster(mn,evoSize-6);
    eMon.x=ex+3;eMon.y=evoY+1;
    scrollContent.addChild(eMon);

    // Arrow between
    if(mi<members.length-1){
      const arrow=tx('>',9,P.grayDk);
      arrow.x=ex+evoSize+0;arrow.y=evoY+9;
      scrollContent.addChild(arrow);
    }

    // Tap to navigate
    const eTap=new PIXI.Graphics();
    rect(eTap,ex,evoY,evoSize,evoSize,0x000000);eTap.alpha=0;
    eTap.eventMode='static';eTap.cursor='pointer';
    eTap.on('pointerdown',()=>{selectedIdx=mn-1;buildProfile();});
    scrollContent.addChild(eTap);

    ex+=evoSize+evoGap;
  });

  cy+=62;

  // ── 4. AI Concept Section ──
  const conceptBg=new PIXI.Graphics();
  rect(conceptBg,0,cy,GW,70,P.panel);
  rect(conceptBg,0,cy+69,GW,1,P.border);
  scrollContent.addChild(conceptBg);

  const conceptLabel=tx('AI 개념',9,P.gray);
  conceptLabel.x=16;conceptLabel.y=cy+8;
  scrollContent.addChild(conceptLabel);

  // Core concept badge
  const coreColor=CONCEPT_COLORS[detail.core]||0x555555;
  const coreBadge=new PIXI.Graphics();
  const coreTxt=detail.core;
  const coreBW=coreTxt.length*10+20;
  rect(coreBadge,16,cy+26,coreBW,24,coreColor,4);
  scrollContent.addChild(coreBadge);
  const coreTx=tx(coreTxt,12,0xffffff);
  coreTx.x=26;coreTx.y=cy+30;
  scrollContent.addChild(coreTx);

  // Sub concept badge
  const subColor=CONCEPT_COLORS[detail.sub]||0x444444;
  const subBadge=new PIXI.Graphics();
  const subTxt=detail.sub;
  const subBW=subTxt.length*9+16;
  rect(subBadge,16+coreBW+8,cy+28,subBW,20,subColor,4);
  scrollContent.addChild(subBadge);
  const subTx=tx(subTxt,10,0xffffff);
  subTx.x=24+coreBW+8;subTx.y=cy+31;
  scrollContent.addChild(subTx);

  cy+=74;

  // ── 5. Spec Grid (2x3) ──
  const specBg=new PIXI.Graphics();
  rect(specBg,0,cy,GW,120,P.panelLt);
  rect(specBg,0,cy+119,GW,1,P.border);
  scrollContent.addChild(specBg);

  const specData=[
    ['입력 방식',detail.input],
    ['출력 방식',detail.output],
    ['모델 파라미터',detail.params],
    ['파일 크기',detail.size_kb+'KB'],
    ['성향',detail.temper],
    [info.brand,''],
  ];

  const cellW=Math.floor((GW-16*2-8)/2);
  const cellH=36;
  for(let i=0;i<6;i++){
    const col=i%2, row=Math.floor(i/2);
    const sx=16+col*(cellW+8);
    const sy=cy+8+row*(cellH+4);

    const specCell=new PIXI.Graphics();
    rect(specCell,sx,sy,cellW,cellH,P.panel,4);
    bdr(specCell,sx,sy,cellW,cellH,P.border,1,4);
    scrollContent.addChild(specCell);

    const specLbl=tx(specData[i][0],8,P.gray);
    specLbl.x=sx+6;specLbl.y=sy+3;
    scrollContent.addChild(specLbl);

    if(specData[i][1]){
      const specVal=tx(specData[i][1],10,P.white);
      specVal.x=sx+6;specVal.y=sy+17;
      scrollContent.addChild(specVal);
    } else if(i===5){
      // Brand color swatch
      const swatch=new PIXI.Graphics();
      rect(swatch,sx+6,sy+18,12,12,brandHex,2);
      scrollContent.addChild(swatch);
    }
  }

  cy+=124;

  // ── 6. Stat Bars ──
  const statLabels=['HP','ATK','DEF','SPD'];
  const statColors=[P.green,P.red,P.blue,P.yellow];

  // Generate stats seeded by dex no
  let ss=no*2654435761;
  const sr=()=>{ss=(ss*1103515245+12345)&0x7fffffff;return ss/0x7fffffff;};
  const stats=[Math.floor(sr()*65+35),Math.floor(sr()*65+30),Math.floor(sr()*65+30),Math.floor(sr()*65+30)];

  const statSectionH=8+statLabels.length*24+8;
  const statBg=new PIXI.Graphics();
  rect(statBg,0,cy,GW,statSectionH,P.panel);
  rect(statBg,0,cy+statSectionH-1,GW,1,P.border);
  scrollContent.addChild(statBg);

  const BAR_X=60, BAR_W=GW-120;
  statLabels.forEach((lbl,i)=>{
    const sy=cy+10+i*24;

    const lblTx=tx(lbl,9,P.gray);
    lblTx.x=16;lblTx.y=sy+2;
    scrollContent.addChild(lblTx);

    const barBg=new PIXI.Graphics();
    rect(barBg,BAR_X,sy+4,BAR_W,8,P.black,3);
    scrollContent.addChild(barBg);

    const barFill=new PIXI.Graphics();
    const w=Math.max(4,(stats[i]/100)*BAR_W);
    rect(barFill,BAR_X,sy+4,w,8,statColors[i],3);
    scrollContent.addChild(barFill);

    const valTx=tx(String(stats[i]),9,statColors[i]);
    valTx.x=BAR_X+BAR_W+6;valTx.y=sy+1;
    scrollContent.addChild(valTx);
  });

  cy+=statSectionH+4;

  // ── 7. Motif Section ──
  const motifText=tx(detail.motif,10,P.white,GW-40);
  const motifH=Math.max(40,motifText.height+30);

  const motifBg=new PIXI.Graphics();
  rect(motifBg,0,cy,GW,motifH,P.panelLt);
  rect(motifBg,0,cy+motifH-1,GW,1,P.border);
  scrollContent.addChild(motifBg);

  const motifLabel=tx('모티프',9,P.gray);
  motifLabel.x=16;motifLabel.y=cy+6;
  scrollContent.addChild(motifLabel);

  motifText.x=16;motifText.y=cy+20;
  scrollContent.addChild(motifText);

  cy+=motifH+4;

  // ── 8. Description Section ──
  const flavorText=tx(detail.flavor,10,P.white,GW-40);
  const flavorH=Math.max(60,flavorText.height+34);

  const flavorBg=new PIXI.Graphics();
  rect(flavorBg,0,cy,GW,flavorH,P.panel);
  rect(flavorBg,0,cy+flavorH-1,GW,1,P.border);
  scrollContent.addChild(flavorBg);

  const flavorLabel=tx('도감 설명',9,P.gray);
  flavorLabel.x=16;flavorLabel.y=cy+6;
  scrollContent.addChild(flavorLabel);

  flavorText.x=16;flavorText.y=cy+22;
  scrollContent.addChild(flavorText);

  cy+=flavorH+16;

  // Store total content height for scrolling
  scrollContent._contentH=cy;

  // Store monster sprite ref for floating animation
  scrollContent._monSprite=monSprite;
}

/* ============================================================
   TOUCH SCROLL + SWIPE DETECTION
   ============================================================ */
let dragging=false, dragY0=0, dragX0=0, scrollY0=0;
let vel=0, lastDY=0, lastDT=0;
let swipeDetected=false, scrollLocked=false;
const SWIPE_THRESHOLD=40;
const SCROLL_LOCK_THRESHOLD=8;

const scrollHit=new PIXI.Graphics();
rect(scrollHit,0,SCROLL_TOP,GW,SCROLL_H,0x000000);
scrollHit.alpha=0;
scrollHit.eventMode='static';
root.addChild(scrollHit);
// Move to just below scroll area but above nothing
root.setChildIndex(scrollHit,root.getChildIndex(scrollClip)+1);
// Ensure header/footer are on top
root.removeChild(hdrContainer);root.addChild(hdrContainer);
root.removeChild(ftrContainer);root.addChild(ftrContainer);

scrollHit.on('pointerdown',e=>{
  dragging=true;swipeDetected=false;scrollLocked=false;vel=0;
  dragY0=e.global.y/fit;
  dragX0=e.global.x/fit;
  scrollY0=scrollContent.y;
  lastDY=dragY0;lastDT=performance.now();
});

scrollHit.on('pointermove',e=>{
  if(!dragging)return;
  const y=e.global.y/fit;
  const x=e.global.x/fit;
  const dx=x-dragX0;
  const dy=y-dragY0;

  // Determine scroll direction lock
  if(!scrollLocked&&!swipeDetected){
    if(Math.abs(dy)>SCROLL_LOCK_THRESHOLD){
      scrollLocked=true; // vertical scroll wins
    } else if(Math.abs(dx)>SWIPE_THRESHOLD){
      swipeDetected=true; // horizontal swipe wins
    }
  }

  if(scrollLocked){
    const contentH=scrollContent._contentH||GH;
    const minScroll=Math.min(0,-(contentH-SCROLL_H));
    scrollContent.y=Math.max(minScroll,Math.min(0,scrollY0+dy));
    const now=performance.now(),dt=now-lastDT;
    if(dt>0)vel=(y-lastDY)/dt*16;
    lastDY=y;lastDT=now;
  }
});

const onUp=e=>{
  if(!dragging)return;
  dragging=false;

  if(swipeDetected){
    const dx=(e.global.x/fit)-dragX0;
    if(dx<-SWIPE_THRESHOLD&&selectedIdx<150){
      selectedIdx++;buildProfile();
    }else if(dx>SWIPE_THRESHOLD&&selectedIdx>0){
      selectedIdx--;buildProfile();
    }
  }
};
scrollHit.on('pointerup',onUp);
scrollHit.on('pointerupoutside',onUp);

// Inertia scrolling
app.ticker.add(()=>{
  if(!dragging&&Math.abs(vel)>0.2){
    const contentH=scrollContent._contentH||GH;
    const minScroll=Math.min(0,-(contentH-SCROLL_H));
    scrollContent.y=Math.max(minScroll,Math.min(0,scrollContent.y+vel));
    vel*=0.92;
  }
});

// Floating animation
let tick=0;
app.ticker.add(()=>{
  tick+=0.04;
  const mon=scrollContent._monSprite;
  if(mon&&mon._baseY!==undefined){
    mon.y=mon._baseY+Math.sin(tick)*4;
  }
});

/* ============================================================
   INIT
   ============================================================ */
buildProfile();

})();
</script>
