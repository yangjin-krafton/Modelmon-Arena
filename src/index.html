<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Modelmon Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    #app { width: 100vw; height: 100vh; position: relative; }
    #title-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10;
      background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 70%);
    }
    #title-screen h1 {
      font-size: 4rem; font-weight: 900;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7, #ff6b6b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 0.5rem;
    }
    .subtitle { font-size: 1.2rem; color: #8888aa; margin-bottom: 2rem; }
    .btn-primary {
      padding: 1rem 3rem; font-size: 1.2rem; font-weight: 700;
      border: 2px solid #7b2ff7; border-radius: 8px;
      background: transparent; color: #c8a8ff; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover {
      background: #7b2ff7; color: #fff;
      box-shadow: 0 0 20px rgba(123, 47, 247, 0.5);
    }
    #game-canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="app">
    <div id="title-screen">
      <h1>Modelmon Arena</h1>
      <p class="subtitle">AI 모델 턴제 배틀 게임</p>
      <button id="btn-start" class="btn-primary">Battle Start</button>
    </div>
    <canvas id="game-canvas"></canvas>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('game-canvas');
    const titleScreen = document.getElementById('title-screen');
    const btnStart = document.getElementById('btn-start');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x0a0a1a);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 1, 0);

    scene.add(new THREE.AmbientLight(0x404060, 1.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 2);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // Arena floor
    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(5, 64),
      new THREE.MeshStandardMaterial({ color: 0x1a1a3e, emissive: 0x0a0a2e, roughness: 0.8 })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Ring
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(4.8, 5, 64),
      new THREE.MeshBasicMaterial({ color: 0x7b2ff7, side: THREE.DoubleSide })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.01;
    scene.add(ring);

    // Placeholder modelmons
    const monLeft = new THREE.Mesh(
      new THREE.SphereGeometry(0.6, 32, 32),
      new THREE.MeshStandardMaterial({ color: 0x00d4ff, emissive: 0x003344 })
    );
    monLeft.position.set(-2, 0.8, 0);
    scene.add(monLeft);

    const monRight = new THREE.Mesh(
      new THREE.SphereGeometry(0.6, 32, 32),
      new THREE.MeshStandardMaterial({ color: 0xff6b6b, emissive: 0x441111 })
    );
    monRight.position.set(2, 0.8, 0);
    scene.add(monRight);

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      monLeft.position.y = 0.8 + Math.sin(t * 2) * 0.15;
      monRight.position.y = 0.8 + Math.sin(t * 2 + Math.PI) * 0.15;
      monLeft.rotation.y = t * 0.5;
      monRight.rotation.y = -t * 0.5;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    btnStart.addEventListener('click', () => {
      titleScreen.style.display = 'none';
    });
  </script>
</body>
</html>
